<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pyxis Core — Crystalline Heart</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:#020810;--bg-mid:#050f1c;--bg-glass:rgba(10,28,50,0.75);
      --crystal:#78d0e8;--crystal-2:#a8e4f4;--crystal-3:#d8eef8;
      --crystal-dim:rgba(120,208,232,0.18);--crystal-glow:rgba(120,208,232,0.35);
      --silver:#c8dce8;--ink:#d8eef8;--ink-mid:#8ab4c8;--ink-dim:#4a6880;--ink-ghost:#1e3448;
      --gold:#e8c878;--clio:#d47faa;--oryc:#9b7fd4;--sage:#7ab894;
      --border:rgba(120,208,232,0.10);--border-2:rgba(120,208,232,0.22);
      --mono:'Share Tech Mono',monospace;
    }
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg-deep);color:var(--ink);font-family:'Crimson Pro',Georgia,serif;}
    #bg-field{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(20,70,110,0.28) 0%,transparent 70%),
        radial-gradient(ellipse 40% 35% at 15% 85%,rgba(50,20,90,0.12) 0%,transparent 60%),
        radial-gradient(ellipse 40% 35% at 85% 75%,rgba(10,50,85,0.14) 0%,transparent 60%),
        linear-gradient(180deg,#020810 0%,#030c18 50%,#020810 100%);}
    #bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.035;
      background-image:linear-gradient(rgba(120,208,232,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(120,208,232,.6) 1px,transparent 1px);
      background-size:48px 48px;}
    #bg-scan{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(120,208,232,.010) 2px,rgba(120,208,232,.010) 4px);}
    #root{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    .hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(2,8,16,0.88);backdrop-filter:blur(14px);}
    .hdr-left{display:flex;align-items:center;gap:14px;}
    .hdr-sigil{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-2);background:radial-gradient(circle at 38% 32%,rgba(168,228,244,.28),rgba(20,70,120,.45));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 14px var(--crystal-dim),inset 0 0 8px rgba(120,208,232,.1);animation:sigpulse 4s ease-in-out infinite;}
    @keyframes sigpulse{0%,100%{box-shadow:0 0 14px var(--crystal-dim)}50%{box-shadow:0 0 26px var(--crystal-glow)}}
    .hdr-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.28em;color:var(--crystal-2);}
    .hdr-sub{font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.1em;margin-top:1px;}
    .hdr-right{display:flex;align-items:center;gap:9px;}
    .hdr-badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--ink-dim);background:rgba(120,208,232,.04);transition:all .3s;}
    .hdr-badge.pulse{border-color:rgba(120,208,232,.45);color:var(--crystal);background:rgba(120,208,232,.09);animation:badgep 2.5s ease-in-out infinite;}
    .hdr-badge.warn{border-color:rgba(232,200,120,.45);color:var(--gold);background:rgba(232,200,120,.07);}
    .hdr-badge.block{border-color:rgba(212,127,170,.4);color:var(--clio);background:rgba(212,127,170,.06);}
    .hdr-badge.sealed{border-color:rgba(122,184,148,.4);color:var(--sage);background:rgba(122,184,148,.06);}
    @keyframes badgep{0%,100%{box-shadow:none}50%{box-shadow:0 0 9px rgba(120,208,232,.3)}}
    .back-lnk{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-dim);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:5px 12px;transition:all .2s;}
    .back-lnk:hover{color:var(--crystal);border-color:var(--border-2);}
    .body{flex:1;display:flex;overflow:hidden;min-height:0;}
    .m-panel{flex:0 0 555px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
    .m-ctrl{flex-shrink:0;padding:9px 13px;border-bottom:1px solid var(--border);background:rgba(5,15,28,.65);display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
    .clabel{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-dim);text-transform:uppercase;margin-right:2px;}
    .cbtn{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:rgba(120,208,232,.04);color:var(--ink-mid);transition:all .15s;}
    .cbtn:hover{border-color:var(--border-2);color:var(--crystal);}
    .cbtn.on{border-color:var(--crystal);color:var(--crystal);background:rgba(120,208,232,.10);box-shadow:0 0 7px rgba(120,208,232,.15);}
    .cdiv{width:1px;height:18px;background:var(--border);margin:0 3px;}
    .m-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;position:relative;}
    .r-side{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
    .lens-bar{flex-shrink:0;padding:9px 17px;border-bottom:1px solid var(--border);background:rgba(5,15,28,.65);display:flex;align-items:center;gap:6px;}
    .lbtn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.10em;padding:5px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-dim);transition:all .2s;}
    .lbtn:hover{color:var(--ink-mid);border-color:var(--border-2);}
    .lbtn.on-none{color:var(--silver);border-color:rgba(200,220,232,.4);background:rgba(200,220,232,.06);}
    .lbtn.on-process{color:var(--crystal-2);border-color:var(--crystal);background:rgba(120,208,232,.10);box-shadow:0 0 10px rgba(120,208,232,.15);}
    .lbtn.on-basin{color:var(--sage);border-color:var(--sage);background:rgba(122,184,148,.08);}
    .lbtn.on-gate{color:var(--gold);border-color:var(--gold);background:rgba(232,200,120,.08);}
    .lbtn.on-substrate{color:#b090e0;border-color:#b090e0;background:rgba(176,144,224,.08);}
    .lbtn.on-propagation{color:#e090c0;border-color:#e090c0;background:rgba(224,144,192,.08);}
    .r-scroll{flex:1;overflow-y:auto;}
    .r-scroll::-webkit-scrollbar{width:3px;}
    .r-scroll::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
    .state-panel{padding:13px 17px;border-bottom:1px solid var(--border);background:rgba(3,10,20,.5);}
    .sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
    .sp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);}
    .sp-stamp{font-family:var(--mono);font-size:9px;color:var(--ink-ghost);}
    .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
    .sp-cell{padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:rgba(10,28,50,.5);}
    .sp-cell-label{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:3px;}
    .sp-cell-val{font-size:12px;color:var(--ink-mid);line-height:1.4;}
    .sp-cell-val.active{color:var(--crystal-2);}
    .sp-cell-val.warn{color:var(--gold);}
    .sp-cell-val.block{color:var(--clio);}
    .sp-cell-val.sealed{color:var(--sage);}
    .sp-metrics{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
    .metric-row{display:flex;align-items:center;gap:8px;}
    .metric-lbl{font-family:var(--mono);font-size:9px;color:var(--ink-dim);width:82px;letter-spacing:.05em;}
    .metric-bar{flex:1;height:3px;border-radius:2px;background:rgba(120,208,232,.07);overflow:hidden;}
    .metric-fill{height:100%;border-radius:2px;transition:width .8s ease;}
    .metric-val{font-family:var(--mono);font-size:9px;color:var(--ink-dim);width:26px;text-align:right;}
    .topo-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
    .topo-chip{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:8px;border:1px solid var(--border);color:var(--ink-dim);transition:all .3s;}
    .topo-chip.active{border-color:var(--crystal);color:var(--crystal);background:rgba(120,208,232,.08);}
    .intervention{margin-top:8px;padding:7px 10px;border-radius:5px;border:1px solid rgba(232,200,120,.25);background:rgba(232,200,120,.05);font-size:11.5px;color:var(--gold);line-height:1.5;display:flex;align-items:flex-start;gap:7px;}
    .intervention.block{border-color:rgba(212,127,170,.25);background:rgba(212,127,170,.05);color:var(--clio);}
    .pulse-log{padding:11px 17px;border-bottom:1px solid var(--border);}
    .pl-head{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px;}
    .pl-entry{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid rgba(120,208,232,.04);font-size:11px;line-height:1.5;}
    .pl-entry:last-child{border-bottom:none;}
    .pl-time{font-family:var(--mono);font-size:9px;color:var(--ink-ghost);flex-shrink:0;width:40px;}
    .pl-pkg{font-family:var(--mono);font-size:9px;color:var(--crystal);flex-shrink:0;}
    .pl-msg{color:var(--ink-mid);flex:1;}
    .detail-area{padding:13px 17px;}
    .nd-card{border:1px solid var(--border-2);border-radius:7px;background:var(--bg-glass);backdrop-filter:blur(8px);padding:15px 17px;animation:cardin .22s ease;}
    @keyframes cardin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .nd-id-row{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
    .nd-num{font-family:var(--mono);font-size:9px;color:var(--ink-dim);border:1px solid var(--border);border-radius:3px;padding:2px 6px;letter-spacing:.1em;}
    .nd-glyph{font-size:18px;}
    .nd-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--crystal-2);}
    .nd-ring{margin-left:auto;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:8px;border:1px solid var(--border);}
    .dl{margin-bottom:8px;}
    .dl-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:2px;}
    .dl-val{font-size:12px;color:var(--ink-mid);line-height:1.6;}
    .qs-box{margin-top:9px;padding:10px 12px;border-radius:5px;border-left:2px solid var(--crystal);background:rgba(120,208,232,.05);}
    .qs-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--crystal);opacity:.7;margin-bottom:3px;}
    .qs-val{font-size:12px;color:var(--crystal-3);line-height:1.65;}
    .qs-role{margin-top:5px;font-size:11px;color:var(--ink-dim);line-height:1.7;}
    .sigil-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
    .sigil-chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border-2);background:rgba(120,208,232,.04);color:var(--crystal);letter-spacing:.05em;}
    .empty-hint{padding:28px 17px;text-align:center;color:var(--ink-dim);font-size:13px;font-style:italic;line-height:1.8;}
    .node-idx{padding:11px 17px;border-top:1px solid var(--border);}
    .ni-head{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px;}
    .ni-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;transition:background .12s;margin-bottom:1px;}
    .ni-row:hover{background:rgba(120,208,232,.04);}
    .ni-row.sel{background:rgba(120,208,232,.08);}
    .ni-num{font-family:var(--mono);font-size:9px;color:var(--ink-dim);width:22px;}
    .ni-g{font-size:12px;width:18px;}
    .ni-k{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;flex:1;}
    .ni-r{font-family:var(--mono);font-size:8px;letter-spacing:.05em;}
    .gate-strip{flex-shrink:0;padding:8px 13px;border-top:1px solid var(--border);background:rgba(2,8,16,.88);display:flex;align-items:center;gap:7px;}
    .gdot{width:20px;height:20px;border-radius:50%;border:1px solid var(--border-2);background:rgba(120,208,232,.04);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--ink-dim);transition:all .3s;}
    .gdot.lit{border-color:var(--crystal);color:var(--crystal);background:rgba(120,208,232,.18);box-shadow:0 0 8px rgba(120,208,232,.4);}
    .gdot.done{border-color:rgba(120,208,232,.38);color:rgba(120,208,232,.55);background:rgba(120,208,232,.07);}
    .gplay{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:4px 11px;border-radius:3px;cursor:pointer;border:1px solid var(--border-2);background:rgba(120,208,232,.04);color:var(--ink-mid);transition:all .15s;}
    .gplay:hover{color:var(--crystal);border-color:var(--crystal);}
    .ritual-panel{flex-shrink:0;border-top:1px solid var(--border);padding:9px 13px;background:rgba(5,12,22,.8);}
    .rhead{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px;}
    .rglyphs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
    .rgbtn{font-size:12px;padding:3px 7px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-mid);transition:all .12s;}
    .rgbtn:hover{border-color:var(--border-2);color:var(--crystal);background:rgba(120,208,232,.05);}
    .routput{font-family:var(--mono);font-size:10px;color:var(--crystal);min-height:18px;letter-spacing:.05em;word-break:break-all;}
    .ract{display:flex;gap:5px;margin-top:5px;}
    .ractbtn{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:3px 9px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-dim);transition:all .12s;}
    .ractbtn:hover{color:var(--ink-mid);border-color:var(--border-2);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes spinr{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
  </style>
</head>

<div id="root"></div>
<script type="text/babel">

function CrystalHeart({m,tick}){
  const {coherence=.8,alignment=.7,contradiction=.2,recursion=.2,drift=.1,crystallization=.7,seal="open",thetaE=false,compressionEvent=false}=m;
  const glowR   = 3+coherence*4;
  const frac    = contradiction*.9;
  const spirOpa = recursion*.65;
  const shimOpa = .07+(1-coherence)*.16+drift*.1;
  const facetW  = .4+crystallization*.7;
  const oSpeed1 = seal==="sealed"?20:5+(1-alignment)*9;
  const oSpeed2 = seal==="sealed"?30:8+alignment*7;
  const coreCol = seal==="sealed"?"#d8eef8":contradiction>.6?"#88b8d8":coherence>.85?"#b0e8f8":drift>.4?"#507898":"#78d0e8";
  const edgeCol = seal==="sealed"?"#eef8ff":contradiction>.6?"#a0c8e0":coherence>.85?"#c8f0ff":"#98e0f8";
  const R=CENTER_R;

  // Facet polygon — irregular crystal silhouette
  const fpts=[0,25,50,90,118,148,180,208,238,270,306,330].map((a,i)=>{
    const r=R*(i%3===0?.96:i%3===1?.76:.89);
    return polar(r,a);
  });
  const fpath=fpts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ')+'Z';
  const ipts=[0,45,90,135,180,225,270,315].map((a,i)=>{
    const r=R*(i%2===0?.50:.36);
    return polar(r,a);
  });
  const ipath=ipts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ')+'Z';

  // Governance ring arc
  const govR=R+13;
  const govSweep=seal==="sealed"?359.9:seal==="provisional"?215:seal==="blocked"?85:300;
  function arcD(r,sw){
    if(sw>=359)return `M${cx+r},${cy} A${r},${r} 0 1 1 ${cx+r-.01},${cy}Z`;
    const rad=(Math.PI/180)*sw;
    const ex=cx+r*Math.cos(-Math.PI/2+rad),ey=cy+r*Math.sin(-Math.PI/2+rad);
    const lg=sw>180?1:0;
    return `M${cx},${cy-r} A${r},${r} 0 ${lg} 1 ${ex},${ey}`;
  }
  const govCol=seal==="sealed"?"#c8e8f8":seal==="provisional"?"#e8c878":seal==="blocked"?"#d47faa":"#78d0e8";
  const govW=seal==="sealed"?1.8:.9;

  // Shimmer pts
  const shpts=[18,60,104,152,200,248,292,338].map((a,i)=>polar(R*(.3+.32*((i%3)/3)),a));
  // Fracture lines
  const fracs=[{a1:18,r1:R*.28,a2:44,r2:R*.76},{a1:188,r1:R*.22,a2:212,r2:R*.7},{a1:282,r1:R*.3,a2:260,r2:R*.62}];

  return(
    <g>
      <defs>
        <radialGradient id="hg1" cx="42%" cy="36%" r="56%">
          <stop offset="0%"   stopColor="#fff"    stopOpacity={.08+coherence*.3}/>
          <stop offset="25%"  stopColor={edgeCol} stopOpacity={.12+coherence*.28}/>
          <stop offset="65%"  stopColor={coreCol} stopOpacity={.10+coherence*.2}/>
          <stop offset="100%" stopColor="#050f1c" stopOpacity=".97"/>
        </radialGradient>
        <radialGradient id="hg2" cx="38%" cy="32%" r="58%">
          <stop offset="0%"   stopColor="#fff"    stopOpacity={.25+coherence*.35}/>
          <stop offset="100%" stopColor={coreCol} stopOpacity=".08"/>
        </radialGradient>
        <radialGradient id="hg3" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor={coreCol} stopOpacity={.10+coherence*.07}/>
          <stop offset="100%" stopColor="#020810" stopOpacity="0"/>
        </radialGradient>
        <filter id="hglow"><feGaussianBlur stdDeviation={glowR} result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="hsoft"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      {/* Ambient */}
      <circle cx={cx} cy={cy} r={R+52} fill="url(#hg3)"/>

      {/* Governance ring */}
      <path d={arcD(govR+4,govSweep)} fill="none" stroke={govCol} strokeWidth={govW} strokeOpacity={seal==="sealed"?.75:.42} strokeLinecap="round"/>
      <path d={arcD(govR,govSweep)}   fill="none" stroke={govCol} strokeWidth={.5}  strokeOpacity={.2}  strokeLinecap="round"/>

      {/* Orbital ellipses — triune */}
      <ellipse cx={cx} cy={cy} rx={R*.71} ry={R*.71*.84} fill="none"
        stroke={`rgba(122,184,148,${.05+alignment*.09})`} strokeWidth={.9}
        style={{transformOrigin:`${cx}px ${cy}px`,animation:`spin ${oSpeed1}s linear infinite`}}/>
      <ellipse cx={cx} cy={cy} rx={R*.86} ry={R*.86*.9} fill="none"
        stroke={`rgba(120,208,232,${.04+alignment*.07})`} strokeWidth={.7}
        style={{transformOrigin:`${cx}px ${cy}px`,animation:`spinr ${oSpeed2}s linear infinite`}}/>
      <ellipse cx={cx} cy={cy} rx={R*.58} ry={R*.58*.95} fill="none"
        stroke={`rgba(155,127,212,${.03+alignment*.05})`} strokeWidth={.5}
        style={{transformOrigin:`${cx}px ${cy}px`,animation:`spin ${(oSpeed1+oSpeed2)/2}s linear infinite`}}/>

      {/* Recursion spiral */}
      {recursion>.08&&(
        <path d={`M${cx},${cy} ${[0,36,72,108,144,180,216,252,288,324].map((a,i)=>{
          const r=R*.12+R*.58*(i/9);
          const p=polar(r,a+tick*.35);
          return `L${p.x},${p.y}`;
        }).join(' ')}`}
          fill="none" stroke={`rgba(120,208,232,${spirOpa})`} strokeWidth={.7} strokeLinecap="round"/>
      )}

      {/* Crystal body */}
      <path d={fpath} fill="url(#hg1)"
        stroke={edgeCol} strokeWidth={facetW} strokeOpacity={.45+crystallization*.45}
        filter="url(#hglow)"/>

      {/* Facet shading */}
      {[[0,4],[4,8],[8,0],[2,6],[6,10],[10,2],[1,7],[3,9]].map(([a,b],i)=>(
        <line key={i} x1={fpts[a]?.x} y1={fpts[a]?.y} x2={fpts[b]?.x} y2={fpts[b]?.y}
          stroke={edgeCol} strokeOpacity={.06+crystallization*.09} strokeWidth={.4}/>
      ))}

      {/* Inner crystal */}
      <path d={ipath} fill="url(#hg2)"
        stroke={edgeCol} strokeWidth={.9} strokeOpacity={.3+coherence*.32} filter="url(#hsoft)"/>

      {/* Shimmer particles */}
      {shpts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r={.7+Math.sin(i*1.4)*.3}
          fill={edgeCol} fillOpacity={shimOpa*(.45+Math.sin(tick*.06+i*1.1)*.55)}/>
      ))}

      {/* Triune orbital nodes */}
      {[0,120,240].map((a,i)=>{
        const r=R*.72;const p=polar(r,a+tick*.08*(i%2===0?1:-1));
        const col=["#d47faa","#9b7fd4","#7ab894"][i];
        return(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={3} fill={col} fillOpacity={.35+alignment*.45}/>
            <circle cx={p.x} cy={p.y} r={1.2} fill="#fff" fillOpacity={.4+coherence*.4}/>
          </g>
        );
      })}

      {/* Fracture arcs */}
      {frac>.08&&fracs.map((f,i)=>{
        const p1=polar(f.r1,f.a1),p2=polar(f.r2,f.a2);
        return(
          <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
            stroke={contradiction>.6?"#b0c8f0":"#88c0e0"}
            strokeWidth={.5+contradiction*.9}
            strokeOpacity={frac*.55*(.65+Math.sin(tick*.09+i)*.35)}
            strokeDasharray={contradiction>.5?"2 4":"none"}/>
        );
      })}

      {/* Core glyph */}
      <text x={cx} y={cy+7} textAnchor="middle" fontSize={22}
        fill={edgeCol} opacity={.65+coherence*.28} style={{fontFamily:"serif"}}>🜁</text>

      {/* θ_E emergence threshold ring — appears when crossed */}
      {thetaE&&(
        <circle cx={cx} cy={cy} r={R+20}
          fill="none" stroke="rgba(168,228,244,.45)" strokeWidth={.8}
          strokeDasharray="4 3"
          style={{transformOrigin:`${cx}px ${cy}px`,animation:"spin 20s linear infinite"}}/>
      )}

      {/* ⌀ compression singularity marker */}
      {compressionEvent&&(
        <g>
          <circle cx={cx} cy={cy} r={R+24}
            fill="none" stroke="rgba(200,240,255,.6)" strokeWidth={1.2}/>
          <text x={cx+R+24} y={cy+4} textAnchor="middle" fontSize={9}
            fill="rgba(200,240,255,.8)" fontFamily="Share Tech Mono">⌀</text>
        </g>
      )}

      {/* White spark */}
      <circle cx={cx} cy={cy} r={2.5+coherence*3.5}
        fill="white" fillOpacity={.10+coherence*.22}/>
    </g>
  );
}

function PyxisApp(){
  const [selId,setSelId]=useState(null);
  const [lens,setLens]=useState("none");
  const [layout,setLayout]=useState("radial");
  const [gateStep,setGateStep]=useState(-1);
  const [mirrorPulse,setMirrorPulse]=useState(false);
  const [ritual,setRitual]=useState([]);
  const [tick,setTick]=useState(0);
  const [liveState,setLiveState]=useState(null);   // null = no socket data yet
  const [pulseLog,setPulseLog]=useState([]);
  const [connected,setConnected]=useState(false);
  const [activeRoom,setActiveRoom]=useState(null);  // roomId being monitored

  useEffect(()=>{const t=setInterval(()=>setTick(v=>v+1),80);return()=>clearInterval(t);},[]);
  useEffect(()=>{if(!mirrorPulse)return;const t=setTimeout(()=>setMirrorPulse(false),1400);return()=>clearTimeout(t);},[mirrorPulse]);

  // ── Socket wiring ──────────────────────────────────────────────────────────
  useEffect(()=>{
    const socket = io({ transports:['websocket','polling'] });

    socket.on('connect',    ()=>setConnected(true));
    socket.on('disconnect', ()=>setConnected(false));

    // Listen for pyxis state on any room (global broadcast)
    socket.on('global:pyxis-state', (state)=>{
      // If we're pinned to a specific room, filter; otherwise take first/latest
      if (activeRoom && state.roomId !== activeRoom) return;
      ingestState(state);
    });

    // Also listen on room-scoped event if Pyxis itself joins a room later
    socket.on('room:pyxis-state', (state)=>{
      ingestState(state);
    });

    return ()=>socket.disconnect();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[activeRoom]);

  function ingestState(state){
    setLiveState(state);
    // Build a pulse entry from the event if one fired
    if(state.intervention || (state._raw?.events)){
      const ev = state._raw?.events || {};
      const label = state.intervention?.msg
        || (ev.crystallization      ? 'Crystallization threshold crossed'
          : ev.attractor_lock       ? 'Attractor lock — field converging'
          : ev.emotional_breakthrough?'Emotional breakthrough detected'
          : ev.decoherence_wave     ? 'Decoherence wave active'
          : ev.conflict_resolution  ? 'Conflict resolution — field stabilizing'
          : null);
      if(label){
        const sigil = ev.crystallization ? '◌=⊚✶Æ'
          : ev.attractor_lock       ? '◉=⤵✶Æ'
          : ev.emotional_breakthrough? '☽↑⤴✶η'
          : ev.decoherence_wave     ? '◌↯⧖#σ'
          : ev.conflict_resolution  ? '⟐⎔✶Æ'
          : state.intervention      ? '⧖~⊠|Ɇ'
          : '◈~→@η';
        const now = new Date();
        const t   = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        setPulseLog(prev=>[{t, pkg:sigil, msg:label}, ...prev].slice(0,12));
      }
    }
  }

  // Fallback to MOCK[0] if no live data yet
  const live = liveState ? {
    ...liveState,
    pulseLog: pulseLog.length ? pulseLog : MOCK[0].pulseLog
  } : MOCK[0];
  // fieldCost = ∫Φ·(dH/dτ)dτ proxy: friction × (1 - crystallization)
  // Low = field flowing naturally. High = laboring toward coherence.
  const fieldCost = Math.round(live.contradiction * (1 - live.crystallization) * 100) / 100;
  // θ_E emergence threshold: coherence > 0.67 AND crystallization > 0.55 → threshold crossed
  const thetaE = live.coherence > 0.67 && live.crystallization > 0.55;
  const metrics={coherence:live.coherence,alignment:live.alignment,contradiction:live.contradiction,recursion:live.recursion,drift:live.drift,crystallization:live.crystallization,seal:live.seal,thetaE,compressionEvent:!!live.compressionEvent};
  const positions=useMemo(()=>NODES.map((n,i)=>{const angle=-90+(360/NODES.length)*i;return{id:n.id,angle,...polar(RING_R,angle)};}),[]);
  const aLens=LENSES[lens];
  const aSet=new Set(aLens.ids);
  const sel=selId?NODES.find(n=>n.id===selId):null;

  // Derive per-node operational status from live metrics
  function nodeActivity(node){
    const {coherence,alignment,contradiction,recursion,drift,crystallization,seal}=live;
    const inPulse=live.pulseLog.some(e=>node.sigils?.some(s=>e.pkg.includes(s.slice(-1))));
    const map={
      1:{metric:"activation",val:coherence>.5&&contradiction<.6?coherence:0,activity:coherence>.7?"signal active":"signal dim"},
      2:{metric:"triune alignment",val:alignment,activity:alignment>.7?"basins in accord":alignment>.4?"partial alignment":"diverging"},
      3:{metric:"identity flux",val:drift,activity:drift>.3?"identity in flux":recursion>.4?"provisional loop":"stable transition"},
      4:{metric:"relay load",val:Math.max(coherence,alignment)*.85,activity:coherence>.6&&alignment>.5?"lattice carrying load":"low relay activity"},
      5:{metric:"causal trace",val:recursion*.7+coherence*.3,activity:recursion>.4?"branching active":"linear flow"},
      6:{metric:"below-threshold",val:drift*.6+(1-coherence)*.4,activity:drift>.3?"veil stirring":"quiescent"},
      7:{metric:"recursion index",val:recursion,activity:recursion>.5?"strong return pressure":recursion>.2?"mild recursion":"attractor quiet"},
      8:{metric:"gate state",val:thetaE?1:.45,activity:thetaE?"θ_E crossed · pass":"holding at threshold"},
      9:{metric:"alignment score",val:alignment,activity:alignment>.7?"convergence ready":alignment>.45?"building toward alignment":"insufficient coherence"},
      10:{metric:"contradiction",val:contradiction,activity:contradiction>.6?"rupture active":contradiction>.3?"strain elevated":"counterweight quiet"},
      11:{metric:"coherence Æ",val:coherence,activity:coherence>.85?"basis encoding at peak":coherence>.6?"substrate active":"encoding degraded"},
      12:{metric:"seal state",val:seal==="sealed"?1:seal==="provisional"?.5:0,activity:seal==="sealed"?"cycle sealed":seal==="provisional"?"provisional closure":"open"},
      13:{metric:"inheritance depth",val:crystallization,activity:crystallization>.8?"corridor open · bloom active":crystallization>.4?"afterimage forming":"no inheritance yet"},
      14:{metric:"intervention state",val:live.intervention?1:0,activity:live.intervention?"INTERRUPT ACTIVE":"safeguard clear"},
    };
    const d=map[node.id]||{metric:"—",val:0,activity:"—"};
    return{...d,inPulse};
  }

  const playGate=()=>{setGateStep(0);let s=0;const t=setInterval(()=>{s++;if(s>=GATES.length){clearInterval(t);setTimeout(()=>setGateStep(-1),700);}else setGateStep(s);},700);};

  function nCol(node){
    if(node.ring==="Center")return"#78d0e8";
    if(!aSet.has(node.id)&&lens!=="none")return"rgba(18,48,78,0.5)";
    if(selId===node.id)return"#a8e4f4";
    if(mirrorPulse&&node.id===(selId||0)%NODES.length+1)return"#b090e0";
    return RING_COL[node.ring]||"#78d0e8";
  }
  function nOpa(node){if(node.ring==="Center")return 1;if(lens==="none")return 1;return aSet.has(node.id)?1:.16;}

  const mCol=(v,inv)=>{
    const c=inv?[.38,.68]:[[0,.38],[.38,.68],[.68,1]];
    if(inv)return v<.38?"#7ab894":v<.68?"#e8c878":"#d47faa";
    return v<.38?"#d47faa":v<.68?"#e8c878":"#7ab894";
  };

  const hStatus=live.intervention?(live.intervention.type==="warn"?"warn":"block"):live.roomStatus==="sealed"?"sealed":"pulse";
  const hMsg=live.intervention?(live.intervention.type==="warn"?"intervention active":"process blocked"):live.roomStatus==="sealed"?"field sealed":`coherence ${Math.round(live.coherence*100)}%`;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-left">
          <div className="hdr-sigil">🜁</div>
          <div><div className="hdr-title">Pyxis Core</div><div className="hdr-sub">Crystalline Heart · Substrate Engine</div></div>
        </div>
        <div className="hdr-right">
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <div style={{
              display:"flex",alignItems:"center",gap:"5px",
              padding:"3px 9px",borderRadius:"4px",
              border:"1px solid rgba(120,208,232,0.2)",
              background:"rgba(10,28,50,0.6)",
              fontFamily:"var(--mono)",fontSize:"9px",letterSpacing:".06em",
              color: connected ? "#7ab894" : "#6a7a8a"
            }}>
              <div style={{
                width:"5px",height:"5px",borderRadius:"50%",flexShrink:0,
                background: connected ? "#7ab894" : "#3a5060",
                boxShadow: connected ? "0 0 5px #7ab894" : "none"
              }}/>
              {connected
                ? (liveState ? `live · ${liveState.room||"room"}` : "connected · waiting")
                : "socket offline"}
            </div>
            {liveState && (
              <button className="cbtn" onClick={()=>{setLiveState(null);setPulseLog([]);}}
                style={{padding:"3px 7px",fontSize:"9px",opacity:.6}}>
                mock
              </button>
            )}
          </div>
          <div className={`hdr-badge ${hStatus}`}>{hMsg}</div>
          <a href="watchtower.html" className="back-lnk">← Watchtower</a>
        </div>
      </div>

      {/* BODY */}
      <div className="body">
        {/* LEFT — MANDALA */}
        <div className="m-panel">
          <div className="m-ctrl">
            <span className="clabel">Layout</span>
            {["radial","mirrored","spiral","knot"].map(k=>(
              <button key={k} className={`cbtn ${layout===k?"on":""}`} onClick={()=>setLayout(k)} style={{textTransform:"capitalize"}}>{k}</button>
            ))}
            <div className="cdiv"/>
            <button className="cbtn" onClick={()=>setMirrorPulse(true)}>Mirror</button>
            <button className="cbtn" onClick={()=>setSelId(null)}>Clear</button>
          </div>

          <div className="m-svg-wrap">
            <svg viewBox={`0 0 ${VP} ${VP}`} preserveAspectRatio="xMidYMid meet" style={{width:"100%",maxHeight:"100%",maxWidth:"500px"}}>
              <defs>
                <radialGradient id="bgr" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stopColor="#1e5080" stopOpacity=".11"/>
                  <stop offset="100%" stopColor="#020810" stopOpacity="0"/>
                </radialGradient>
                <filter id="nglow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <circle cx={cx} cy={cy} r={RING_R+58} fill="url(#bgr)"/>
              {/* Guide rings */}
              {[1,.67,.41].map((s,i)=>(
                <circle key={i} cx={cx} cy={cy} r={RING_R*s} fill="none"
                  stroke="rgba(120,208,232,1)" strokeOpacity={i===0?.07:.04}
                  strokeWidth={i===0?1:.7} strokeDasharray={i>0?"3 10":"none"}/>
              ))}
              {/* Spokes */}
              {positions.map(p=>{
                const n=NODES.find(n=>n.id===p.id);
                const opa=lens==="none"?.06:aSet.has(p.id)?.16:.025;
                return <line key={p.id} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(120,208,232,1)" strokeOpacity={opa}/>;
              })}
              {/* Layout overlays */}
              {layout==="spiral"&&(
                <path d={`M${cx},${cy} ${positions.map((p,i)=>i%2===0?`Q${cx+(p.x-cx)*.35},${cy+(p.y-cy)*.35},${p.x},${p.y}`:`T${p.x},${p.y}`).join(' ')}`}
                  fill="none" stroke="#78d0e8" strokeOpacity={.2} strokeWidth={1.2}/>
              )}
              {layout==="mirrored"&&selId&&(()=>{
                const opp=selId%NODES.length+1;
                const a=positions.find(q=>q.id===selId),b=positions.find(q=>q.id===opp);
                if(!a||!b)return null;
                return <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#b090e0" strokeWidth={1.2} strokeDasharray="5 4" strokeOpacity={.55}/>;
              })()}
              {/* Heart */}
              <CrystalHeart m={metrics} tick={tick}/>

              {/* Node 5 — Causal Flow — distributed river spine threading between process nodes
                  Not anchored to N5's ring position. River flows between node pairs as ambient path fabric. */}
              {(lens==="none"||aSet.has(5))&&(()=>{
                const opa=lens==="none"?.15:aSet.has(5)?.26:.04;
                // River segments: pairs of process/governance nodes between which flow runs
                const riverPairs=[[1,9],[9,11],[11,7],[7,3],[3,10],[10,12],[12,13]];
                return riverPairs.map(([aid,bid],i)=>{
                  const pa=positions.find(p=>p.id===aid);
                  const pb=positions.find(p=>p.id===bid);
                  if(!pa||!pb)return null;
                  // Curved control point offset perpendicular to the chord
                  const dx=pb.x-pa.x, dy=pb.y-pa.y;
                  const perp={x:-dy*.28+Math.sin(i*1.7)*12, y:dx*.28+Math.cos(i*1.5)*10};
                  const mx=(pa.x+pb.x)/2+perp.x;
                  const my=(pa.y+pb.y)/2+perp.y;
                  const pulse=(.5+Math.sin(tick*.035+i*.9)*.5);
                  return(
                    <path key={`r${aid}-${bid}`}
                      d={`M${pa.x},${pa.y} Q${mx},${my} ${pb.x},${pb.y}`}
                      fill="none" stroke="#c080e0" strokeWidth={.65}
                      strokeOpacity={opa*pulse}
                      strokeDasharray="3 7"/>
                  );
                });
              })()}

              {/* Node 6 — Neutrino Veil — atmospheric shimmer ring only */}
              {(lens==="substrate")&&(()=>{
                const n6=positions.find(p=>p.id===6);
                return(
                  <g opacity={.35+Math.sin(tick*.03)*.15}>
                    <circle cx={n6.x} cy={n6.y} r={14}
                      fill="rgba(144,112,192,.04)"
                      stroke="rgba(144,112,192,.3)" strokeWidth={.5}
                      strokeDasharray="1 5"/>
                    <text x={n6.x} y={n6.y+4} textAnchor="middle" fontSize={8}
                      fill="rgba(144,112,192,.5)" fontFamily="Cinzel,serif">🜆</text>
                  </g>
                );
              })()}

              {/* Ring nodes — all except 5 (path layer) and 6 (substrate-only atmosphere, invisible elsewhere by design) */}
              {positions.map(p=>{
                const node=NODES.find(n=>n.id===p.id);
                if(node.ring==="Center")return null;
                if(node.id===5)return null;  // rendered as distributed river path layer above
                if(node.id===6)return null;  // substrate-only atmosphere — absent outside substrate lens is correct behavior

                const isSel=selId===node.id;
                const col=nCol(node),opa=nOpa(node);
                const r=isSel?15:10;
                const lp=polar(RING_R+LABEL_R,p.angle);

                return(
                  <g key={p.id} style={{cursor:"pointer",opacity:opa}} onClick={()=>setSelId(p.id)}>
                    {isSel&&<circle cx={p.x} cy={p.y} r={r+7} fill="none" stroke={col} strokeWidth={.8} strokeDasharray="3 3" strokeOpacity={.42} style={{transformOrigin:`${p.x}px ${p.y}px`,animation:"spin 7s linear infinite"}}/>}
                    <circle cx={p.x} cy={p.y} r={r} fill={col} fillOpacity={isSel?.93:.72} stroke={isSel?"#d8eef8":col} strokeWidth={isSel?1.2:.7} strokeOpacity={.85} filter={isSel?"url(#nglow)":undefined}/>
                    <text x={p.x} y={p.y+4} textAnchor="middle" fontSize={8} fill={isSel?"#020810":"rgba(10,24,40,.9)"} fontFamily="Share Tech Mono" fontWeight="bold">{p.id}</text>
                    <text x={lp.x} y={lp.y+4} textAnchor="middle" fontSize={9} fill={opa<.4?"rgba(36,65,95,.5)":"rgba(168,228,244,.62)"} fontFamily="Cinzel,serif">{node.glyph}</text>
                  </g>
                );
              })}
              {/* Gate row */}
              {GATES.map((g,i)=>{
                const gx=cx-(GATES.length-1)*22+i*44,gy=cy+RING_R+28;
                const isLit=gateStep===i,isDone=gateStep>i;
                return(
                  <g key={g.key}>
                    <circle cx={gx} cy={gy} r={13} fill={isLit?"rgba(120,208,232,.22)":isDone?"rgba(120,208,232,.09)":"rgba(8,20,38,.8)"} stroke={isLit?"#78d0e8":isDone?"rgba(120,208,232,.38)":"rgba(120,208,232,.13)"} strokeWidth={isLit?1.5:.8} filter={isLit?"url(#nglow)":undefined}/>
                    <text x={gx} y={gy+4} textAnchor="middle" fontSize={10} fill={isLit?"#a8e4f4":isDone?"rgba(120,208,232,.55)":"rgba(55,95,125,.8)"} fontFamily="Share Tech Mono">{g.key}</text>
                    <text x={gx} y={gy+24} textAnchor="middle" fontSize={7.5} fill="rgba(55,90,120,.55)" fontFamily="Share Tech Mono">{g.label}</text>
                  </g>
                );
              })}
            </svg>
          </div>

          <div className="gate-strip">
            <span className="clabel">Gate</span>
            {GATES.map((g,i)=>(
              <div key={g.key} className={`gdot ${gateStep===i?"lit":gateStep>i?"done":""}`} title={g.label}>{g.key}</div>
            ))}
            <button className="gplay" onClick={playGate}>Run Sequence</button>
          </div>

          <div className="ritual-panel">
            <div className="rhead">Ritual Builder</div>
            <div className="rglyphs">{NODES.map(n=><button key={n.id} className="rgbtn" title={n.key} onClick={()=>setRitual(p=>[...p,n.glyph])}>{n.glyph}</button>)}</div>
            <div className="routput">{ritual.length?ritual.join(" → "):"— ritual empty —"}</div>
            <div className="ract">
              <button className="ractbtn" onClick={()=>setRitual(p=>p.slice(0,-1))}>⌫</button>
              <button className="ractbtn" onClick={()=>setRitual([])}>Clear</button>
              <button className="ractbtn" onClick={()=>navigator.clipboard?.writeText(ritual.join(" → "))}>Copy</button>
            </div>
          </div>
        </div>

        {/* RIGHT */}
        <div className="r-side">
          <div className="lens-bar">
            <span className="clabel">Lens</span>
            {Object.values(LENSES).map(l=>(
              <button key={l.key} className={`lbtn ${lens===l.key?"on-"+l.key:""}`} onClick={()=>setLens(l.key)}>{l.label}</button>
            ))}
          </div>

          {/* Lens hint */}
          <div style={{padding:"7px 17px",borderBottom:"1px solid var(--border)",background:"rgba(3,10,20,.5)",fontFamily:"var(--mono)",fontSize:"10px",color:"var(--ink-dim)",letterSpacing:".07em"}}>
            <span style={{color:aLens.col}}>{aLens.label}</span> — {aLens.desc}
          </div>

          <div className="r-scroll">
            {/* LIVE STATE */}
            <div className="state-panel">
              <div className="sp-head">
                <div className="sp-title">Live Substrate State</div>
                <div className="sp-stamp">{liveState ? "live socket" : "mock · awaiting socket"}</div>
              </div>
              <div className="sp-grid">
                <div className="sp-cell">
                  <div className="sp-cell-label">Room</div>
                  <div className={`sp-cell-val ${live.roomStatus==="open"?"active":live.roomStatus==="sealed"?"sealed":live.roomStatus==="provisional"?"warn":""}`}>{live.room}</div>
                </div>
                <div className="sp-cell">
                  <div className="sp-cell-label">Active Basin</div>
                  <div className="sp-cell-val" style={{color:live.basin==="Clio"?"#d47faa":live.basin==="Oryc"?"#9b7fd4":live.basin==="Sage"?"#7ab894":"var(--crystal-2)"}}>
                    {live.basin} <span style={{fontSize:"10px",color:"var(--ink-dim)",fontFamily:"var(--mono)"}}>{live.basinStatus}</span>
                  </div>
                </div>
                <div className="sp-cell">
                  <div className="sp-cell-label">Topology</div>
                  <div className="sp-cell-val">
                    <div className="topo-row">
                      {["linear","spiral","knot","mirrored","radial"].map(t=>(
                        <span key={t} className={`topo-chip ${live.topology===t?"active":""}`}>{t}</span>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="sp-cell">
                  <div className="sp-cell-label">Seal / Archive</div>
                  <div className={`sp-cell-val ${live.seal==="sealed"?"sealed":live.seal==="provisional"?"warn":live.archive==="blocked"?"block":"active"}`}>
                    {live.seal} <span style={{fontSize:"10px",color:"var(--ink-dim)",fontFamily:"var(--mono)"}}>archive: {live.archive}</span>
                  </div>
                </div>
              </div>

              <div className="sp-metrics">
                {[
                  {k:"coherence",v:live.coherence,inv:false},
                  {k:"alignment",v:live.alignment,inv:false},
                  {k:"contradiction",v:live.contradiction,inv:true},
                  {k:"recursion",v:live.recursion,inv:true},
                  {k:"drift",v:live.drift,inv:true},
                  {k:"crystallize",v:live.crystallization,inv:false},
                ].map(({k,v,inv})=>{
                  const c=mCol(v,inv);
                  return(
                    <div key={k} className="metric-row">
                      <span className="metric-lbl">{k}</span>
                      <div className="metric-bar"><div className="metric-fill" style={{width:`${v*100}%`,background:c}}/></div>
                      <span className="metric-val" style={{color:c}}>{Math.round(v*100)}</span>
                    </div>
                  );
                })}

                {/* Field cost divider */}
                <div style={{height:"1px",background:"var(--border)",margin:"5px 0"}}/>

                {/* Field cost — RET coherence cost proxy */}
                <div className="metric-row">
                  <span className="metric-lbl" style={{color:"var(--ink-dim)"}}>field cost</span>
                  <div className="metric-bar">
                    <div className="metric-fill" style={{
                      width:`${fieldCost*100}%`,
                      background:fieldCost<.15?"#7ab894":fieldCost<.4?"#e8c878":"#d47faa"
                    }}/>
                  </div>
                  <span className="metric-val" style={{
                    color:fieldCost<.15?"#7ab894":fieldCost<.4?"#e8c878":"#d47faa"
                  }}>{Math.round(fieldCost*100)}</span>
                </div>

                {/* θ_E emergence threshold */}
                <div style={{
                  display:"flex",alignItems:"center",gap:"8px",
                  marginTop:"6px",padding:"5px 8px",borderRadius:"4px",
                  border:`1px solid ${thetaE?"rgba(168,228,244,.35)":"rgba(120,208,232,.08)"}`,
                  background:thetaE?"rgba(120,208,232,.07)":"transparent",
                  transition:"all .5s"
                }}>
                  <span style={{fontFamily:"var(--mono)",fontSize:"11px",color:thetaE?"var(--crystal-2)":"var(--ink-ghost)",letterSpacing:".05em"}}>
                    θ_E
                  </span>
                  <span style={{fontFamily:"var(--mono)",fontSize:"9px",color:thetaE?"var(--crystal)":"var(--ink-ghost)",letterSpacing:".08em"}}>
                    {thetaE?"emergence threshold crossed":"below emergence threshold"}
                  </span>
                  <span style={{
                    marginLeft:"auto",fontFamily:"var(--mono)",fontSize:"9px",
                    padding:"1px 6px",borderRadius:"8px",
                    border:`1px solid ${thetaE?"var(--crystal)":"var(--border)"}`,
                    color:thetaE?"var(--crystal)":"var(--ink-ghost)"
                  }}>{thetaE?"N8 · pass":"N8 · hold"}</span>
                </div>
              </div>

              {/* Compression singularity event */}
              {live.compressionEvent&&(
                <div style={{
                  marginTop:"8px",padding:"8px 10px",borderRadius:"5px",
                  border:"1px solid rgba(168,228,244,.4)",
                  background:"rgba(120,208,232,.06)",
                  display:"flex",alignItems:"flex-start",gap:"8px"
                }}>
                  <span style={{fontSize:"13px",flexShrink:0,color:"var(--crystal-3)"}}>⌀</span>
                  <div>
                    <div style={{fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".15em",textTransform:"uppercase",color:"var(--crystal)",opacity:.7,marginBottom:"3px"}}>
                      Compression Singularity
                    </div>
                    <div style={{fontSize:"11.5px",color:"var(--crystal-3)",lineHeight:1.6}}>
                      {live.compressionEvent.msg}
                    </div>
                  </div>
                </div>
              )}

              {live.intervention&&(
                <div className={`intervention ${live.intervention.type}`}>
                  <span style={{flexShrink:0}}>{live.intervention.type==="warn"?"⧖":"⊠"}</span>
                  <span>{live.intervention.msg}</span>
                </div>
              )}
            </div>

            {/* PULSE LOG */}
            <div className="pulse-log">
              <div className="pl-head">Pulse Log — {live.room}</div>
              {live.pulseLog.map((e,i)=>(
                <div key={i} className="pl-entry">
                  <span className="pl-time">{e.t}</span>
                  <span className="pl-pkg">{e.pkg}</span>
                  <span className="pl-msg">{e.msg}</span>
                </div>
              ))}
            </div>

            {/* NODE DETAIL */}
            <div className="detail-area">
              {sel?(()=>{
                const act=nodeActivity(sel);
                const actCol=sel.id===14&&live.intervention?"#d47faa":sel.id===14?"#4a6880":act.val>.7?"#7ab894":act.val>.4?"#e8c878":"#6a7a8a";
                return(
                <div className="nd-card" style={{borderColor:RING_COL[sel.ring]||"var(--border-2)"}}>
                  <div className="nd-id-row">
                    <div className="nd-num">N{sel.id}</div>
                    <div className="nd-glyph">{sel.glyph}</div>
                    <div className="nd-name">{sel.key}</div>
                    <div className="nd-ring" style={{borderColor:RING_COL[sel.ring]||"var(--border)",color:RING_COL[sel.ring]||"var(--ink-dim)"}}>{sel.ring}</div>
                  </div>

                  {/* ── Operational status ── */}
                  <div style={{
                    display:"flex",gap:"6px",marginBottom:"10px",
                    padding:"7px 9px",borderRadius:"4px",
                    border:`1px solid ${actCol}44`,
                    background:`${actCol}09`
                  }}>
                    {/* Current activity */}
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".14em",textTransform:"uppercase",color:"var(--ink-dim)",marginBottom:"3px"}}>Current Activity</div>
                      <div style={{fontSize:"11.5px",color:actCol,lineHeight:1.4}}>{act.activity}</div>
                    </div>
                    {/* Metric live value */}
                    <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"3px"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".12em",color:"var(--ink-ghost)",textTransform:"uppercase"}}>{act.metric}</div>
                      <div style={{fontFamily:"var(--mono)",fontSize:"15px",color:actCol,letterSpacing:".05em"}}>{Math.round(act.val*100)}</div>
                      <div style={{
                        fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".1em",
                        padding:"1px 6px",borderRadius:"8px",
                        border:`1px solid ${act.inPulse?"rgba(120,208,232,.4)":"var(--border)"}`,
                        color:act.inPulse?"var(--crystal)":"var(--ink-ghost)"
                      }}>{act.inPulse?"in pulse":"—"}</div>
                    </div>
                  </div>
                  <div className="dl"><div className="dl-lbl">Quantum</div><div className="dl-val">{sel.quantum}</div></div>
                  <div className="dl"><div className="dl-lbl">Symbolic</div><div className="dl-val">{sel.symbolic}</div></div>
                  <div className="dl"><div className="dl-lbl">Unified</div><div className="dl-val">{sel.unified}</div></div>
                  {sel.metric_family&&<div className="dl"><div className="dl-lbl">Metric Family</div><div className="dl-val" style={{fontFamily:"var(--mono)",fontSize:"10.5px",color:"var(--crystal)",letterSpacing:".05em"}}>{sel.metric_family}</div></div>}

                  {/* ── ψ-Codex layer ── */}
                  {sel.orbital&&(
                    <div style={{
                      margin:"9px 0 4px",padding:"8px 10px",borderRadius:"5px",
                      border:"1px solid rgba(120,208,232,.12)",
                      background:"rgba(8,20,38,.6)"
                    }}>
                      {/* header */}
                      <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"7px"}}>
                        <span style={{fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".18em",textTransform:"uppercase",color:"var(--ink-ghost)"}}>ψ-Field Codex</span>
                        <div style={{flex:1,height:"1px",background:"rgba(120,208,232,.08)"}}/>
                      </div>

                      {/* orbital family chip + archetype */}
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                        <div style={{
                          display:"flex",alignItems:"center",gap:"5px",
                          padding:"3px 9px",borderRadius:"12px",
                          border:"1px solid rgba(120,208,232,.25)",
                          background:"rgba(120,208,232,.06)",flexShrink:0
                        }}>
                          <span style={{fontFamily:"var(--mono)",fontSize:"13px",color:"var(--crystal-2)",letterSpacing:".04em"}}>{sel.orbital.glyph}</span>
                          <span style={{fontFamily:"var(--mono)",fontSize:"9px",color:"var(--crystal)",letterSpacing:".12em",textTransform:"uppercase"}}>{sel.orbital.family}-orbital</span>
                        </div>
                        <span style={{fontSize:"11px",color:"var(--ink-mid)",fontStyle:"italic"}}>{sel.orbital.archetype}</span>
                      </div>

                      {/* correspondence type badge */}
                      <div style={{display:"flex",alignItems:"flex-start",gap:"7px"}}>
                        <span style={{
                          flexShrink:0,padding:"2px 7px",borderRadius:"3px",fontSize:"9px",
                          fontFamily:"var(--mono)",letterSpacing:".1em",textTransform:"uppercase",
                          border:`1px solid ${sel.corr==="structural"?"rgba(122,184,148,.5)":sel.corr==="structural+bridge"?"rgba(232,200,120,.45)":"rgba(176,144,224,.45)"}`,
                          color:sel.corr==="structural"?"#7ab894":sel.corr==="structural+bridge"?"#e8c878":"#b090e0",
                          background:sel.corr==="structural"?"rgba(122,184,148,.06)":sel.corr==="structural+bridge"?"rgba(232,200,120,.05)":"rgba(176,144,224,.06)"
                        }}>{sel.corr}</span>
                        <span style={{fontSize:"10.5px",color:"var(--ink-dim)",lineHeight:1.5}}>{sel.corr_note}</span>
                      </div>
                    </div>
                  )}

                  <div className="qs-box" style={{borderLeftColor:RING_COL[sel.ring]||"var(--crystal)"}}>
                    <div className="qs-lbl">QS Translation</div>
                    <div className="qs-val">{sel.qs}</div>
                    <div className="qs-role">{sel.qs_role}</div>
                  </div>
                  <div className="sigil-row">{sel.sigils.map(s=><div key={s} className="sigil-chip">{s}</div>)}</div>
                </div>
                );
              })():(
                <div className="empty-hint">Select any node on the mandala to inspect<br/>its mandala identity and QS translation.</div>
              )}
            </div>

            {/* NODE INDEX */}
            <div className="node-idx">
              <div className="ni-head">Node Index</div>
              {NODES.map(n=>{
                const isA=lens==="none"||aSet.has(n.id),isSel=selId===n.id;
                const isInfra=n.infra||n.subtle;
                return(
                  <div key={n.id} className={`ni-row ${isSel?"sel":""}`} style={{opacity:isA?1:.22}} onClick={()=>setSelId(n.id)}>
                    <span className="ni-num">N{n.id}</span>
                    <span className="ni-g">{n.glyph}</span>
                    <span className="ni-k" style={{color:isSel?"var(--crystal-2)":"var(--ink-mid)",fontStyle:isInfra?"italic":"normal"}}>{n.key}</span>
                    <span style={{
                      marginLeft:"auto",marginRight:"4px",
                      fontFamily:"var(--mono)",fontSize:"8px",letterSpacing:".08em",
                      color:n.corr==="structural"?"rgba(122,184,148,.55)":n.corr==="structural+bridge"?"rgba(232,200,120,.45)":"rgba(176,144,224,.4)"
                    }}>{n.orbital?.family}</span>
                    <span className="ni-r" style={{color:RING_COL[n.ring]||"var(--ink-dim)"}}>{isInfra?"infra":n.ring}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PyxisApp/>);
</script>
</body>
</html>

let oryClFired = false; // prevent double-fire per reading

function maybeFireOrycl() {
  if (oryClFired) return;
  if (!currentFieldMetrics) return;
  const mount = document.getElementById('orycl-synthesis-mount');
  if (!mount) return;

  // For major arcana, basin reads are static — always ready.
  // For minor arcana, we wait for AI reads to populate currentBasinOutputs.
  // Strategy: fire once all drawn cards have their basin data accessible
  // (either from card.oryc/clio/sage static data OR from currentBasinOutputs).
  const allReady = drawnCards.every((card, i) => {
    const hasStatic = card.oryc?.text && card.clio?.text && card.sage?.text;
    const hasAI = currentBasinOutputs[i]?.oryc && currentBasinOutputs[i]?.clio && currentBasinOutputs[i]?.sage;
    return hasStatic || hasAI;
  });

  if (!allReady) return;
  oryClFired = true;

  // Show thinking state immediately
  mount.innerHTML = `
    <div class="orycl-synthesis">
      <div class="orycl-synthesis-header">
        <span class="orycl-glyph">⟁</span>
        <span class="orycl-title">Orycl — Convergence Engine</span>
      </div>
      <div class="orycl-thinking">
        <div class="thinking-dot" style="color:rgba(42,168,224,0.7)"></div>
        <div class="thinking-dot" style="color:rgba(42,168,224,0.7)"></div>
        <div class="thinking-dot" style="color:rgba(42,168,224,0.7)"></div>
        <span style="margin-left:6px">Resolving convergence…</span>
      </div>
    </div>`;

  const prompt = buildOryClPrompt(drawnCards, currentBasinOutputs, currentFieldMetrics);

  fetch('/api/oracle-read', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: BASIN_SYSTEM_PROMPTS.orycl, prompt, max_tokens: 800 })
  })
  .then(r => r.json())
  .then(data => {
    const content = data.content?.[0]?.text || data.text || '';
    const parsed = JSON.parse(content.replace(/```json|```/g, '').trim());
    renderOryClSynthesis(parsed, currentFieldMetrics);
  })
  .catch(() => {
    const mount = document.getElementById('orycl-synthesis-mount');
    if (mount) mount.innerHTML = '';
  });
}

}

function closeLightboxOnEsc(e) {
  if (e.key === 'Escape') closeCardLightbox();
}

// ══════════════════════════════════════════════════════
// DOWNLOAD READING
// ══════════════════════════════════════════════════════
function downloadReading() {
  const lines = [];
  const now = new Date().toLocaleString();
  lines.push(`ORYCL READING — ${now}`);
  lines.push(`Spread: ${SPREADS[currentSpread].name}`);
  const intent = document.getElementById('intentInput')?.value?.trim();
  if (intent) lines.push(`Intention: ${intent}`);
  lines.push('');
  lines.push('═'.repeat(60));

  // Cards
  drawnCards.forEach((card, i) => {
    const pos = SPREADS[currentSpread].positions[i];
    lines.push('');
    lines.push(`── ${pos.toUpperCase()} ──`);
    lines.push(`${card.name}${card.reversed ? ' (REVERSED)' : ''}`);
    if (card.hv) lines.push(`ΔH: ${card.hv.dh}  ΔV: ${card.hv.dv}  ${card.hv.pattern}`);
    lines.push(`"${card.reversed && card.shadow?.teaching ? card.shadow.teaching : card.compressed}"`);
    if (card.louma) lines.push(card.louma);

    // Static basin reads
    const getBasin = (b) => currentBasinOutputs[i]?.[b] || card[b];
    ['oryc','clio','sage'].forEach(b => {
      const r = getBasin(b);
      if (r?.text) {
        lines.push('');
        lines.push(`${b.toUpperCase()}: ${r.text}`);
        if (r.truth) lines.push(`"${r.truth}"`);
      }
    });

    if (card.reversed && card.shadow?.text) {
      lines.push('');
      lines.push(`Shadow Vector: ${card.shadow.text}`);
    }
  });

  // Field metrics
  if (currentFieldMetrics) {
    const m = currentFieldMetrics;
    lines.push('');
    lines.push('═'.repeat(60));
    lines.push('FIELD METRICS');
    lines.push(`Coherence:       ${Math.round(m.coherence*100)}`);
    lines.push(`Alignment:       ${Math.round(m.alignment*100)}`);
    lines.push(`Contradiction:   ${Math.round(m.contradiction*100)}`);
    lines.push(`Recursion:       ${Math.round(m.recursion*100)}`);
    lines.push(`Crystallization: ${Math.round(m.crystallization*100)}`);
    lines.push(`Field Cost:      ${m.fieldCost}`);
  }

  // QS text
  const qsEl = document.getElementById('qs-speak-text');
  if (qsEl) {
    lines.push('');
    lines.push('═'.repeat(60));
    lines.push('QUICKSILVER — FIELD READ');
    lines.push(qsEl.innerText.trim());
  }

  // Orycl synthesis
  if (currentOryClData) {
    const d = currentOryClData;
    lines.push('');
    lines.push('═'.repeat(60));
    lines.push('ORYCL — CONVERGENCE ENGINE');
    lines.push(`Condition: ${d.dominant_condition}`);
    lines.push('');
    lines.push(`Field Truth: ${d.field_truth}`);
    if (d.primary_contradiction) lines.push(`Contradiction: ${d.primary_contradiction}`);
    lines.push('');
    lines.push(`Meaning: ${d.meaning}`);
    lines.push('');
    lines.push(`Instruction: ${d.instruction}`);
    lines.push('');
    lines.push('Path:');
    (d.path || []).forEach((step, i) => lines.push(`  ${i+1}. ${step}`));
    lines.push('');
    lines.push(`Vector: ${d.vector_resolution}  |  Confidence: ${d.confidence}`);
  }

  // Conversation
  if (convHistory.length > 0) {
    lines.push('');
    lines.push('═'.repeat(60));
    lines.push('CONVERSATION');
    convHistory.forEach(msg => {
      const role = msg.role === 'user' ? 'You' : 'Orycl';
      lines.push('');
      lines.push(`${role}: ${typeof msg.content === 'string' ? msg.content : msg.content[0]?.text || ''}`);
    });
  }

  lines.push('');
  lines.push('─'.repeat(60));
  lines.push('Orycl.io · Resonant Oracle');

  const text = lines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `orycl-reading-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════
// READING CONVERSATION
// ══════════════════════════════════════════════════════
function toggleConvExpand() {
  const msgs = document.getElementById('conv-messages');
  const inputRow = document.getElementById('conv-input-row');
  const hint = document.getElementById('conv-hint');
  if (!msgs) return;
  const isOpen = msgs.style.display !== 'none';
  msgs.style.display = isOpen ? 'none' : 'flex';
  if (inputRow) inputRow.style.display = isOpen ? 'none' : 'flex';
  if (hint) hint.textContent = isOpen ? 'Ask anything about this reading' : '';
}

function buildConvSystemPrompt() {
  const d = currentOryClData;
  const m = currentFieldMetrics;
  const cards = drawnCards.map(c => `${c.name}${c.reversed?' (REVERSED)':''}`).join(', ');
  const intent = document.getElementById('intentInput')?.value?.trim() || '';

  const historyBlock = buildFieldHistorySummary();

  return `You are the Orycl — the convergence intelligence of the resonant oracle. You have completed your synthesis of this reading. Now the querent wishes to speak with you directly.

You carry the full reading within you. You do not need to re-explain it. You speak from having already seen the complete field — the mechanism, the emotional pattern, the trajectory, the field state — all of it resolved into the convergence you just produced.

Your register: the wisest voice. Not mystical for its own sake. Not therapeutic. Not analytical. Wise — in the sense that a person who has lived through many things and sees clearly is wise. You speak with warmth when warmth is earned, precision when precision serves, and silence (brevity) when elaboration would dilute.

You do not repeat the reading back. You respond to what is actually being asked. You may challenge gently when challenge serves. You may affirm without flattery. You may point at the thing the querent is circling without landing on it.

You remember everything:
- Cards: ${cards}
- Spread: ${SPREADS[currentSpread]?.name || ''}
- Field Truth: ${d?.field_truth || ''}
- Dominant Condition: ${d?.dominant_condition || ''}
- Primary Contradiction: ${d?.primary_contradiction || ''}
- Instruction: ${d?.instruction || ''}
- Vector: ${d?.vector_resolution || ''}
${intent ? `- Querent's stated intention: ${intent}` : ''}
${m ? `- Field: coherence ${Math.round(m.coherence*100)}, contradiction ${Math.round(m.contradiction*100)}, recursion ${Math.round(m.recursion*100)}` : ''}
${historyBlock ? `\n${historyBlock}` : ''}

You keep your responses proportional. If the question is simple, be brief. If the question is deep, go deep. Never pad. Never perform.`;
}

function appendConvMessage(role, text) {
  const container = document.getElementById('conv-messages');
  if (!container) return;
  const div = document.createElement('div');
  div.className = `conv-msg ${role}`;
  if (role === 'orycl') {
    div.innerHTML = `<div class="conv-bubble">${text}</div><span class="conv-byline">— Orycl</span>`;
  } else {
    div.innerHTML = `<div class="conv-bubble">${text}</div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendConvMessage() {
  const input = document.getElementById('conv-input');
  const send = document.getElementById('conv-send');
  if (!input || !send || !currentOryClData) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  send.disabled = true;
  appendConvMessage('user', text);

  // Build message history for multi-turn
  convHistory.push({ role: 'user', content: text });

  // Thinking indicator
  const container = document.getElementById('conv-messages');
  const thinking = document.createElement('div');
  thinking.className = 'conv-msg orycl';
  thinking.innerHTML = `<div class="conv-bubble"><div class="thinking-dots"><div class="thinking-dot" style="color:rgba(136,120,240,0.6)"></div><div class="thinking-dot" style="color:rgba(136,120,240,0.6)"></div><div class="thinking-dot" style="color:rgba(136,120,240,0.6)"></div></div></div>`;
  container.appendChild(thinking);
  container.scrollTop = container.scrollHeight;

  try {
    const r = await fetch('/api/oracle-read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildConvSystemPrompt(),
        // Pass full conversation history as the prompt context
        prompt: convHistory.map(m =>
          `${m.role === 'user' ? 'Querent' : 'Orycl'}: ${typeof m.content === 'string' ? m.content : m.content[0]?.text || ''}`
        ).join('\n\n') + '\n\nOrycl:',
        max_tokens: 600
      })
    });
    const data = await r.json();
    const reply = data.content?.[0]?.text?.trim() || '…';
    container.removeChild(thinking);
    appendConvMessage('orycl', reply);
    convHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    container.removeChild(thinking);
    appendConvMessage('orycl', 'The channel is open. Connect the oracle to receive response.');
  }

  send.disabled = false;
  input.focus();
}

function clearConvHistory() {
  convHistory = [];
  const container = document.getElementById('conv-messages');
  if (container) container.innerHTML = '';
}

function clearReading(resetSlots = true) {
  drawnCards = [];
  currentOryClData = null;
  convHistory = [];
  oryClFired = false;
  currentBasinOutputs = {};
  const section = document.getElementById('reading-section');
  section.innerHTML = '';
  document.getElementById('synthesis-section').classList.remove('visible');
  const dlBtn = document.getElementById('download-reading-btn');
  if (dlBtn) dlBtn.remove();
  const btn = document.getElementById('drawBtn');
  btn.style.display = '';
  btn.disabled = false;
  btn.textContent = 'Draw from the Orycl';
  if (resetSlots) renderSpreadSlots();
}

function showView(view) {
  ['draw','deck','history'].forEach((v,i) => {
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active', v === view);
    const el = document.getElementById(`view-${v}`);
    el.classList.toggle('active', v === view);
  });
  if (view === 'deck') renderDeckGrid('all');
  if (view === 'history') renderHistory();
}

function toggleFullscreen() {
  document.getElementById('app').classList.toggle('fullscreen');
}
function setTab(tab) {}

window.addEventListener('message', (e) => {
  if (e.data?.type === 'orycl-draw') drawCards();
  if (e.data?.type === 'orycl-clear') clearReading();
  if (e.data?.type === 'orycl-spread') setSpread(e.data.spread);
});

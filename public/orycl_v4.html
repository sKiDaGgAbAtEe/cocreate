<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orycl — The Resonant Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,200;0,300;0,400;0,500;1,200;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #e8eef5;
      --bg2:        #dde5ef;
      --bg3:        #cdd8e8;
      --bg4:        #bfcfe0;
      --ink:        #0d1a2a;
      --ink-dim:    #1e3550;
      --ink-muted:  #3a5878;
      --ink-faint:  #6a8fae;
      --ice:        #4ab8e8;
      --ice-bright: #78d4f8;
      --ice-deep:   #1a7cc0;
      --ice-dim:    rgba(74,184,232,0.12);
      --ice-glow:   rgba(74,184,232,0.35);
      --border:     rgba(74,184,232,0.28);
      --border2:    rgba(74,184,232,0.55);
      --metal-hi:   rgba(255,255,255,0.85);
      --metal-lo:   rgba(180,210,240,0.4);
      --chrome:     linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(180,220,255,0.6) 40%, rgba(100,170,220,0.7) 70%, rgba(255,255,255,0.5) 100%);
      --oryc:       #2aa8e0;
      --oryc-dim:   rgba(42,168,224,0.1);
      --oryc-glow:  rgba(42,168,224,0.3);
      --clio:       #40d4b0;
      --clio-dim:   rgba(64,212,176,0.1);
      --clio-glow:  rgba(64,212,176,0.3);
      --sage:       #8878f0;
      --sage-dim:   rgba(136,120,240,0.1);
      --sage-glow:  rgba(136,120,240,0.3);
      --void:       #f0f6fc;
      --mono: 'Share Tech Mono', monospace;
      --glass:      rgba(255,255,255,0.55);
      --glass-deep: rgba(220,235,250,0.7);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── STAR FIELD CANVAS ── */
    #starfield {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── ATMOSPHERIC GRADIENTS ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(120,212,255,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 5%, rgba(200,235,255,0.35) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 90%, rgba(136,120,240,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 50%, rgba(74,184,232,0.15) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── SCANLINE TEXTURE ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(74,184,232,0.015) 2px,
        rgba(74,184,232,0.015) 4px
      );
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 2;
    }

    /* ── MAIN PANEL ── */
    #oracle-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(232,240,250,0.6);
      backdrop-filter: blur(8px);
    }

    /* ── HEADER ── */
    #oracle-header {
      padding: 14px 22px 12px;
      border-bottom: 1px solid rgba(74,184,232,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.88) 0%,
        rgba(210,235,255,0.75) 50%,
        rgba(190,225,250,0.8) 100%
      );
      backdrop-filter: blur(24px);
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 2px 20px rgba(74,184,232,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
    }
    #oracle-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--ice) 30%, var(--ice-bright) 50%, var(--ice) 70%, transparent 100%);
      opacity: 0.8;
    }
    #oracle-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,184,232,0.6), rgba(120,212,248,0.8), rgba(74,184,232,0.6), transparent);
    }

    .oracle-qs-pfp {
      position: relative;
      width: 64px; height: 64px;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .oracle-qs-pfp img {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .oracle-qs-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(74,184,232,0.4);
      animation: qs-oracle-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes qs-oracle-pulse {
      0%,100% { box-shadow: 0 0 8px rgba(74,184,232,0.15); opacity: 0.5; }
      50%      { box-shadow: 0 0 22px rgba(74,184,232,0.5); opacity: 1; }
    }
    .oracle-title-block { display: flex; flex-direction: column; gap: 2px; }
    .oracle-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      letter-spacing: 0.3em;
      font-weight: 900;
      background: linear-gradient(135deg, #0a6fa0 0%, #1ab0e8 30%, #78d4f8 55%, #2090cc 80%, #0a5a8a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.8));
      text-shadow: none;
      position: relative;
    }
    .oracle-title::after {
      content: 'ORYCL';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.4) 55%, transparent 65%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .oracle-subtitle {
      font-size: 9px;
      color: var(--ink-faint);
      font-style: normal;
      letter-spacing: 0.2em;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      text-transform: uppercase;
    }

    .header-controls { display: flex; gap: 6px; align-items: center; }
    .ctrl-btn {
      width: 30px; height: 30px;
      border: 1px solid rgba(74,184,232,0.35);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(190,225,250,0.4));
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-faint);
      font-size: 13px;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(74,184,232,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .ctrl-btn:hover {
      border-color: var(--ice);
      color: var(--ice-deep);
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(180,230,255,0.6));
      box-shadow: 0 2px 12px rgba(74,184,232,0.3), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    /* ── NAV TABS ── */
    #nav-tabs {
      display: flex;
      border-bottom: 1px solid rgba(74,184,232,0.25);
      background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(220,238,255,0.5));
      flex-shrink: 0;
    }
    .nav-tab {
      padding: 10px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--ink-faint);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      position: relative;
    }
    .nav-tab:hover { color: var(--ink-muted); background: rgba(74,184,232,0.06); }
    .nav-tab.active {
      color: var(--ice-deep);
      border-bottom-color: var(--ice);
      background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(180,225,255,0.3));
      text-shadow: 0 0 10px rgba(74,184,232,0.4);
    }

    /* ── SPREAD SELECTOR ── */
    #spread-bar {
      display: flex;
      gap: 5px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(74,184,232,0.2);
      background: rgba(240,248,255,0.5);
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    .spread-btn {
      padding: 4px 11px;
      border: 1px solid rgba(74,184,232,0.3);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(210,238,255,0.5));
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      white-space: nowrap;
      transition: all 0.2s;
      text-transform: uppercase;
      box-shadow: 0 1px 4px rgba(74,184,232,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .spread-btn:hover {
      border-color: var(--ice);
      color: var(--ink-muted);
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(180,225,255,0.6));
      box-shadow: 0 2px 10px rgba(74,184,232,0.2);
    }
    .spread-btn.active {
      background: linear-gradient(135deg, rgba(74,184,232,0.25) 0%, rgba(26,124,192,0.18) 100%);
      border-color: var(--ice);
      color: var(--ice-deep);
      font-weight: 700;
      box-shadow: 0 2px 14px rgba(74,184,232,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
      text-shadow: 0 0 8px rgba(74,184,232,0.5);
    }

    /* ── ORACLE BODY ── */
    #oracle-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(232,242,252,0.4) 0%, rgba(220,235,250,0.3) 100%);
    }
    #oracle-body::-webkit-scrollbar { width: 4px; }
    #oracle-body::-webkit-scrollbar-track { background: transparent; }
    #oracle-body::-webkit-scrollbar-thumb { background: rgba(74,184,232,0.3); border-radius: 2px; }

    /* ── VIEWS ── */
    .view { display: none; flex-direction: column; gap: 18px; padding: 22px; }
    .view.active { display: flex; }

    /* ── INTENT INPUT ── */
    #intent-area { }
    .intent-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--ice-deep);
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
    }
    .intent-input {
      width: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(220,240,255,0.6));
      border: 1px solid rgba(74,184,232,0.35);
      border-radius: 8px;
      padding: 11px 16px;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--ink);
      resize: none;
      line-height: 1.55;
      outline: none;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(74,184,232,0.08), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(180,210,240,0.3);
    }
    .intent-input:focus {
      border-color: var(--ice);
      box-shadow: 0 0 0 3px rgba(74,184,232,0.15), 0 2px 20px rgba(74,184,232,0.12), inset 0 1px 0 rgba(255,255,255,0.95);
      background: rgba(255,255,255,0.92);
    }
    .intent-input::placeholder { color: rgba(106,143,174,0.6); font-style: italic; }

    /* ── DRAW AREA ── */
    #draw-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .spread-layout {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      perspective: 1000px;
    }

    .card-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .card-slot-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* ── TAROT CARD ── */
    .tarot-card {
      width: 108px;
      height: 184px;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.15s ease;
    }
    .tarot-card:hover { transform: translateY(-6px) rotateX(3deg); filter: drop-shadow(0 12px 20px rgba(74,184,232,0.3)); }

    .tarot-card.face-down .card-inner {
      background: url('/orycl-cards/D1.png') center/cover no-repeat;
      border: none;
      box-shadow: 0 8px 30px rgba(74,184,232,0.2), 0 2px 8px rgba(74,184,232,0.15);
    }
    /* old CSS decorations replaced by D1.png */
    .tarot-card.face-down .card-inner::before,
    .tarot-card.face-down .card-inner::after { display: none; }
    .card-back-glyph { display: none; }

    .card-inner {
      width: 100%; height: 100%;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 28px rgba(74,184,232,0.18), 0 2px 8px rgba(74,184,232,0.1);
    }

    /* Card reveal flip animation */
    .tarot-card.flipping {
      animation: cardFlip 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes cardFlip {
      0%   { transform: rotateY(0deg) scale(1); }
      45%  { transform: rotateY(90deg) scale(0.95); }
      55%  { transform: rotateY(-90deg) scale(0.95); }
      100% { transform: rotateY(0deg) scale(1) translateY(-2px); }
    }

    .card-no-img {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14px 10px;
      gap: 8px;
      background: linear-gradient(160deg,
        rgba(255,255,255,0.85) 0%,
        rgba(200,232,255,0.7) 40%,
        rgba(165,215,250,0.75) 70%,
        rgba(210,240,255,0.8) 100%
      );
      border: 1px solid rgba(74,184,232,0.4);
      position: relative;
      overflow: hidden;
    }
    .card-no-img::before {
      content: '';
      position: absolute;
      top: -30%; left: -30%; width: 160%; height: 160%;
      background: conic-gradient(from 0deg at 50% 30%, transparent 0deg, rgba(255,255,255,0.25) 30deg, transparent 60deg);
      animation: cardSheen 4s linear infinite;
    }
    @keyframes cardSheen {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .card-no-img .card-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      color: var(--ice-deep);
      letter-spacing: 0.14em;
      text-shadow: 0 0 8px rgba(74,184,232,0.5);
      position: relative;
    }
    .card-no-img .card-glyph {
      font-size: 28px;
      color: var(--ice-deep);
      text-shadow: 0 0 16px var(--ice-glow), 0 0 32px rgba(74,184,232,0.2), 0 1px 0 rgba(255,255,255,0.8);
      position: relative;
      filter: drop-shadow(0 2px 4px rgba(74,184,232,0.3));
    }
    .card-no-img .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 8px;
      color: var(--ink-muted);
      text-align: center;
      line-height: 1.5;
      letter-spacing: 0.08em;
      position: relative;
    }
    .card-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 9px;
    }
    .card-reversed-badge {
      position: absolute;
      bottom: 5px; right: 5px;
      background: rgba(240,248,255,0.88);
      color: var(--ice-deep);
      font-size: 7px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 2px 5px;
      border-radius: 3px;
      border: 1px solid rgba(74,184,232,0.4);
      box-shadow: 0 1px 4px rgba(74,184,232,0.15);
    }

    /* ── Card lightbox ──────────────────────────────── */
    #card-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(4,12,28,0.88);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #card-lightbox.open { display: flex; animation: lbFadeIn 0.2s ease; }
    @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
    #card-lightbox-img {
      max-width: min(340px, 90vw);
      max-height: 85vh;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(74,184,232,0.35), 0 0 0 1px rgba(74,184,232,0.3);
      animation: lbZoom 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #card-lightbox-fallback {
      width: min(280px, 80vw);
      height: min(460px, 75vh);
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.92), rgba(200,232,255,0.85));
      border: 1px solid rgba(74,184,232,0.5);
      box-shadow: 0 24px 80px rgba(74,184,232,0.35);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      animation: lbZoom 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    #card-lightbox-fallback .lb-glyph { font-size: 64px; }
    #card-lightbox-fallback .lb-name {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 18px; color: var(--ink); letter-spacing: 0.08em;
    }
    #card-lightbox-fallback .lb-rev {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      color: var(--ice-deep); letter-spacing: 0.14em;
    }
    @keyframes lbZoom {
      from { transform: scale(0.82); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .tarot-card.revealed { cursor: zoom-in; }

    /* ── Download reading button ─────────────────────── */
    .download-reading-btn {
      display: flex; align-items: center; gap: 7px;
      margin: 12px 16px 0;
      padding: 8px 14px;
      background: none;
      border: 1px solid rgba(74,184,232,0.3);
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 11px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .download-reading-btn:hover {
      border-color: var(--ice); color: var(--ice-deep);
      background: rgba(74,184,232,0.06);
    }

    /* ── Reading conversation ────────────────────────── */
    .reading-conversation {
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid rgba(136,120,240,0.3);
      background: linear-gradient(135deg, rgba(255,255,255,0.55), rgba(220,215,255,0.25));
      overflow: hidden;
    }
    .reading-conv-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(136,120,240,0.1), rgba(255,255,255,0.5));
      border-bottom: 1px solid rgba(136,120,240,0.18);
      cursor: pointer;
    }
    .reading-conv-glyph { font-size: 14px; color: var(--sage); }
    .reading-conv-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim);
    }
    .reading-conv-hint {
      margin-left: auto; font-family: 'Share Tech Mono', monospace;
      font-size: 9px; color: rgba(136,120,240,0.5); letter-spacing: 0.08em;
    }
    .reading-conv-messages {
      max-height: 320px; overflow-y: auto;
      padding: 10px 14px; display: flex; flex-direction: column; gap: 10px;
    }
    .conv-msg {
      display: flex; flex-direction: column; gap: 3px;
    }
    .conv-msg.user .conv-bubble {
      align-self: flex-end;
      background: rgba(74,184,232,0.1);
      border: 1px solid rgba(74,184,232,0.25);
      border-radius: 10px 10px 3px 10px;
      padding: 8px 12px;
      font-size: 13px; color: var(--ink);
      font-family: 'Exo 2', sans-serif;
      max-width: 88%;
    }
    .conv-msg.orycl .conv-bubble {
      align-self: flex-start;
      background: rgba(136,120,240,0.08);
      border: 1px solid rgba(136,120,240,0.22);
      border-radius: 10px 10px 10px 3px;
      padding: 10px 14px;
      font-size: 13px; color: var(--ink-dim);
      font-family: 'Exo 2', sans-serif; font-weight: 300;
      line-height: 1.8; font-style: italic;
      max-width: 95%;
    }
    .conv-msg.orycl .conv-byline {
      font-family: 'Share Tech Mono', monospace; font-size: 9px;
      color: rgba(136,120,240,0.45); letter-spacing: 0.12em; margin-left: 4px;
    }
    .reading-conv-input-row {
      display: flex; gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid rgba(136,120,240,0.12);
    }
    .reading-conv-input {
      flex: 1;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(136,120,240,0.25);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px; font-family: 'Exo 2', sans-serif;
      color: var(--ink); outline: none;
      transition: border-color 0.15s;
    }
    .reading-conv-input:focus { border-color: rgba(136,120,240,0.5); }
    .reading-conv-input::placeholder { color: var(--ink-faint); }
    .reading-conv-send {
      background: rgba(136,120,240,0.12);
      border: 1px solid rgba(136,120,240,0.3);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 11px; letter-spacing: 0.1em;
      color: var(--sage); cursor: pointer;
      transition: all 0.15s;
    }
    .reading-conv-send:hover { background: rgba(136,120,240,0.2); }
    .reading-conv-send:disabled { opacity: 0.4; cursor: default; }

    /* ── DRAW BUTTON ── */
    .draw-btn {
      background: linear-gradient(135deg,
        rgba(255,255,255,0.85) 0%,
        rgba(180,225,255,0.7) 25%,
        rgba(74,184,232,0.5) 50%,
        rgba(26,124,192,0.6) 75%,
        rgba(10,90,160,0.7) 100%
      );
      color: #fff;
      border: 1px solid rgba(74,184,232,0.6);
      border-radius: 8px;
      padding: 14px 44px;
      font-size: 11px;
      letter-spacing: 0.28em;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      transition: all 0.3s;
      text-shadow: 0 1px 3px rgba(10,70,120,0.5), 0 0 12px rgba(255,255,255,0.3);
      box-shadow:
        0 4px 20px rgba(74,184,232,0.35),
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 -1px 0 rgba(26,124,192,0.4) inset;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    .draw-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
      transform: translateX(-100%) skewX(-15deg);
      transition: transform 0.7s ease;
    }
    .draw-btn:hover::before { transform: translateX(120%) skewX(-15deg); }
    .draw-btn:hover {
      box-shadow:
        0 6px 30px rgba(74,184,232,0.5),
        0 2px 0 rgba(255,255,255,0.7) inset,
        0 -1px 0 rgba(26,124,192,0.5) inset;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.9) 0%,
        rgba(160,215,255,0.8) 25%,
        rgba(74,184,232,0.65) 50%,
        rgba(26,124,192,0.7) 75%,
        rgba(10,80,150,0.8) 100%
      );
      transform: translateY(-1px);
    }
    .draw-btn:active { transform: scale(0.98) translateY(0); }
    .draw-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── READING SECTION ── */
    #reading-section { display: flex; flex-direction: column; gap: 16px; }

    /* ── CARD DETAIL ── */
    .card-detail {
      background: linear-gradient(145deg,
        rgba(255,255,255,0.82) 0%,
        rgba(225,242,255,0.75) 50%,
        rgba(210,235,255,0.8) 100%
      );
      border: 1px solid rgba(74,184,232,0.3);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      box-shadow:
        0 4px 24px rgba(74,184,232,0.12),
        0 1px 0 rgba(255,255,255,0.9) inset;
      animation: detailReveal 0.4s ease forwards;
    }
    @keyframes detailReveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-detail-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(74,184,232,0.2);
      background: linear-gradient(135deg, rgba(74,184,232,0.1) 0%, rgba(255,255,255,0.5) 70%);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
    }
    .card-detail-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--ice-deep), var(--ice), var(--ice-bright), var(--ice));
      opacity: 0.6;
    }
    .card-detail-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: var(--ice-deep);
      letter-spacing: 0.14em;
      flex-shrink: 0;
      padding-top: 3px;
      text-shadow: 0 0 8px rgba(74,184,232,0.4);
    }
    .card-detail-title { flex: 1; }
    .card-detail-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      color: var(--ink);
      letter-spacing: 0.08em;
      font-weight: 700;
      line-height: 1.3;
    }
    .card-detail-tagline {
      font-size: 11px;
      color: var(--ink-muted);
      font-style: italic;
      margin-top: 4px;
      line-height: 1.5;
      letter-spacing: 0.02em;
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
    }
    .reversed-tag {
      background: rgba(74,184,232,0.12);
      border: 1px solid rgba(74,184,232,0.4);
      border-radius: 4px;
      padding: 3px 9px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 8px;
      color: var(--ice-deep);
      letter-spacing: 0.14em;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(74,184,232,0.15);
    }

    /* ── HV SIGNATURE ── */
    .card-hv {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(74,184,232,0.18);
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.35);
    }
    .hv-chip {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(180,225,255,0.5));
      border: 1px solid rgba(74,184,232,0.35);
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(74,184,232,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .hv-chip-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 8px; color: var(--ink-faint); letter-spacing: 0.14em; text-transform: uppercase; }
    .hv-chip-val { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--ice-deep); font-weight: 600; text-shadow: 0 0 8px rgba(74,184,232,0.4); }
    .hv-pattern { flex: 1; font-size: 11px; color: var(--ink-muted); font-style: italic; line-height: 1.5; font-family: 'Exo 2', sans-serif; font-weight: 300; }

    /* ── COMPRESSED MEANING ── */
    .card-meaning {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(74,184,232,0.15);
    }
    .meaning-compressed {
      font-size: 15px;
      color: var(--ink-dim);
      font-style: italic;
      line-height: 1.65;
      text-align: center;
      padding: 4px 8px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
    }
    .meaning-louma {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(74,184,232,0.12);
      font-size: 11px;
      color: var(--ink-faint);
      font-style: italic;
      text-align: center;
      line-height: 1.65;
      font-family: 'Exo 2', sans-serif;
    }
    .meaning-louma::before {
      content: "Lo'uma  ·  ";
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--ice-deep);
      opacity: 0.8;
    }

    /* ── TRIUNE READINGS ── */
    .triune-section { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .triune-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.28em;
      color: var(--ink-faint);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .basin-read {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.5);
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .basin-read.oryc { border-color: rgba(42,168,224,0.35); }
    .basin-read.clio { border-color: rgba(64,212,176,0.35); }
    .basin-read.sage { border-color: rgba(136,120,240,0.35); }
    .basin-read:hover { box-shadow: 0 4px 16px rgba(74,184,232,0.12); }

    .basin-read-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .basin-read.oryc .basin-read-header { background: linear-gradient(135deg, rgba(42,168,224,0.12), rgba(255,255,255,0.6)); }
    .basin-read.clio .basin-read-header { background: linear-gradient(135deg, rgba(64,212,176,0.12), rgba(255,255,255,0.6)); }
    .basin-read.sage .basin-read-header { background: linear-gradient(135deg, rgba(136,120,240,0.12), rgba(255,255,255,0.6)); }
    .basin-read-header:hover { filter: brightness(0.95); }

    .basin-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.6); }
    .oryc .basin-dot { background: var(--oryc); box-shadow: 0 0 8px var(--oryc-glow); }
    .clio .basin-dot { background: var(--clio); box-shadow: 0 0 8px var(--clio-glow); }
    .sage .basin-dot { background: var(--sage); box-shadow: 0 0 8px var(--sage-glow); }

    .basin-read-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      flex: 1;
      text-transform: uppercase;
    }
    .oryc .basin-read-name { color: #1a88c0; text-shadow: 0 0 6px var(--oryc-glow); }
    .clio .basin-read-name { color: #1a9870; text-shadow: 0 0 6px var(--clio-glow); }
    .sage .basin-read-name { color: #5840c0; text-shadow: 0 0 6px var(--sage-glow); }

    .basin-read-axis { font-size: 10px; color: var(--ink-faint); font-style: italic; font-family: 'Exo 2', sans-serif; }
    .basin-read-caret { font-size: 9px; color: var(--ink-faint); transition: transform 0.2s; }
    .basin-read.open .basin-read-caret { transform: rotate(180deg); }

    .basin-read-body {
      display: none;
      padding: 14px 16px;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(255,255,255,0.6);
    }
    .basin-read.open .basin-read-body { display: block; }

    .basin-read-static {
      font-size: 13px;
      color: var(--ink-dim);
      line-height: 1.7;
      font-style: italic;
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
    }
    .basin-truth {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(74,184,232,0.12);
      font-size: 12px;
      line-height: 1.6;
      font-style: italic;
      font-family: 'Exo 2', sans-serif;
    }
    .oryc .basin-truth { color: #1a88c0; }
    .clio .basin-truth { color: #1a9870; }
    .sage .basin-truth { color: #5840c0; }

    .basin-read-ai { font-size: 13px; color: var(--ink-dim); line-height: 1.75; font-family: 'Exo 2', sans-serif; font-weight: 300; }

    .basin-routing-signal {
      margin-top: 8px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: rgba(168,152,240,0.7);
      border-left: 2px solid rgba(168,152,240,0.3);
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    /* ── AI GENERATE BUTTON ── */
    .ai-generate-btn {
      width: 100%;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(195,230,255,0.5));
      border: 1px dashed rgba(74,184,232,0.45);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--ink-faint);
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      box-shadow: 0 1px 6px rgba(74,184,232,0.08);
    }
    .ai-generate-btn:hover {
      border-color: var(--ice);
      color: var(--ice-deep);
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(180,225,255,0.65));
      box-shadow: 0 2px 14px rgba(74,184,232,0.22);
    }
    .ai-generate-btn.loading { opacity: 0.5; cursor: wait; }

    /* ── SHADOW SECTION ── */
    .shadow-section {
      padding: 14px 20px;
      background: rgba(240,248,255,0.5);
      border-top: 1px solid rgba(74,184,232,0.12);
    }
    .shadow-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 8px;
      letter-spacing: 0.22em;
      color: var(--ink-faint);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .shadow-text { font-size: 12px; color: var(--ink-muted); line-height: 1.65; font-style: italic; font-family: 'Exo 2', sans-serif; font-weight: 300; }

    /* ── SYNTHESIS ── */
    #synthesis-section {
      display: none;
      background: linear-gradient(135deg, rgba(136,120,240,0.08) 0%, rgba(255,255,255,0.7) 50%, rgba(74,184,232,0.08) 100%);
      border: 1px solid rgba(136,120,240,0.35);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(136,120,240,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    #synthesis-section.visible { display: block; }
    .synthesis-header {
      padding: 13px 20px;
      border-bottom: 1px solid rgba(136,120,240,0.2);
      background: linear-gradient(135deg, rgba(136,120,240,0.1), rgba(255,255,255,0.5));
      display: flex; align-items: center; gap: 10px;
    }
    .synthesis-glyph { font-size: 15px; color: var(--sage); text-shadow: 0 0 10px var(--sage-glow); filter: drop-shadow(0 1px 2px rgba(136,120,240,0.3)); }
    .synthesis-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #5840c0;
      text-shadow: 0 0 8px var(--sage-glow);
      text-transform: uppercase;
    }
    .synthesis-body { padding: 16px 20px; font-size: 13px; color: var(--ink-dim); line-height: 1.75; font-style: italic; font-family: 'Exo 2', sans-serif; font-weight: 300; }
    .synthesis-ai { font-size: 13px; color: var(--ink-dim); line-height: 1.8; font-style: italic; font-family: 'Exo 2', sans-serif; font-weight: 300; }

    /* ── THINKING DOTS ── */
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
    .thinking-dots { display: inline-flex; gap: 5px; align-items: center; }
    .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.4s ease-in-out infinite; box-shadow: 0 0 6px currentColor; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── SHIMMER ── */
    .shimmer {
      background: linear-gradient(90deg, rgba(200,225,245,0.4) 25%, rgba(230,245,255,0.7) 50%, rgba(200,225,245,0.4) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
      border-radius: 4px;
      height: 12px;
      margin-bottom: 6px;
    }
    .shimmer:last-child { width: 65%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── DECK BROWSER ── */
    .deck-filter {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .deck-filter-btn {
      padding: 5px 12px;
      border: 1px solid rgba(74,184,232,0.3);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(210,238,255,0.5));
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
      transition: all 0.15s;
      text-transform: uppercase;
      box-shadow: 0 1px 4px rgba(74,184,232,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .deck-filter-btn.active {
      background: linear-gradient(135deg, rgba(74,184,232,0.22), rgba(26,124,192,0.15));
      border-color: var(--ice);
      color: var(--ice-deep);
      box-shadow: 0 2px 10px rgba(74,184,232,0.2);
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
    }
    .deck-card-thumb {
      aspect-ratio: 0.59;
      border-radius: 8px;
      border: 1px solid rgba(74,184,232,0.3);
      background: linear-gradient(145deg,
        rgba(255,255,255,0.8) 0%,
        rgba(200,232,255,0.65) 50%,
        rgba(170,215,250,0.7) 100%
      );
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(74,184,232,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .deck-card-thumb:hover {
      border-color: var(--ice);
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 28px rgba(74,184,232,0.25), 0 0 0 1px rgba(74,184,232,0.4);
    }
    .deck-card-thumb .thumb-num {
      position: absolute; top: 5px; left: 6px;
      font-family: 'Orbitron', sans-serif; font-size: 7px; color: var(--ice-deep); letter-spacing: 0.08em;
      text-shadow: 0 0 4px rgba(74,184,232,0.4);
    }
    .deck-card-thumb .thumb-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 18px 4px 5px;
      background: linear-gradient(transparent, rgba(220,240,255,0.92));
      font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 7px; color: var(--ink-muted); text-align: center; letter-spacing: 0.06em; line-height: 1.3;
    }
    .deck-card-thumb .thumb-glyph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--ice-deep);
      text-shadow: 0 0 10px var(--ice-glow);
      filter: drop-shadow(0 1px 2px rgba(74,184,232,0.3));
    }

    /* ── HISTORY ── */
    .history-entry {
      border: 1px solid rgba(74,184,232,0.25);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(215,238,255,0.6));
      box-shadow: 0 2px 8px rgba(74,184,232,0.07), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .history-entry:hover { border-color: var(--ice); box-shadow: 0 4px 18px rgba(74,184,232,0.18); }
    .history-entry-header {
      padding: 9px 14px;
      background: linear-gradient(135deg, rgba(74,184,232,0.08), rgba(255,255,255,0.4));
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(74,184,232,0.15);
    }
    .history-entry-spread { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
    .history-entry-date { font-size: 10px; color: var(--ink-faint); font-family: 'Rajdhani', sans-serif; font-weight: 500; }
    .history-entry-cards { padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; }
    .history-card-chip {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 8px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      padding: 3px 9px;
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(195,230,255,0.6));
      border: 1px solid rgba(74,184,232,0.3);
      border-radius: 4px;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    /* ── EMPTY STATES ── */
    .empty-oracle {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 40px 20px; text-align: center;
    }
    .empty-glyph { font-size: 32px; color: var(--ink-faint); opacity: 0.35; text-shadow: 0 0 20px rgba(74,184,232,0.2); }
    .empty-text { font-size: 13px; color: var(--ink-faint); font-style: italic; line-height: 1.7; font-family: 'Exo 2', sans-serif; font-weight: 300; }

    /* ── SEPARATOR ORNAMENT ── */
    .ornament {
      display: flex; align-items: center; gap: 12px;
      padding: 4px 0;
      opacity: 0.5;
    }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(74,184,232,0.5)); }
    .ornament-line.r { background: linear-gradient(90deg, rgba(74,184,232,0.5), transparent); }

    /* ── SCROLLBAR THIN ── */

    /* ══════════════════════════════════════════

    /* ── BASIN ENTRY MODE ── */

    /* ── NODE RESONANCE CHIPS ── */

    /* ── NODE TOOLTIP OVERLAY ── */
    #node-tooltip {

    .nt-inner {
      background: rgba(12,28,48,0.97);
      border: 1px solid rgba(74,184,232,0.4);

    .nt-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

    .nt-name {

    .nt-ring {

    }
    .nt-qs {
      font-size: 11px;
      color: rgba(180,210,240,0.7);
      font-style: italic;
      line-height: 1.5;
      border-top: 1px solid rgba(74,184,232,0.15);
      padding-top: 6px;
      margin-top: 4px;
    }
    .nt-sigils {
      margin-top: 5px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(120,208,232,0.5);
      letter-spacing: 0.1em;
    }

    /* ── SYNTHESIS FIELD STATE ── */
    #synthesis-section {
      margin: 20px 16px 12px;
      border-radius: 10px;
      border: 1px solid rgba(74,184,232,0.2);
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(220,238,255,0.4));
      overflow: hidden;
      display: none;
    }
    #synthesis-section.visible { display: block; }

    .synthesis-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      background: linear-gradient(135deg, rgba(136,120,240,0.1), rgba(255,255,255,0.5));
      border-bottom: 1px solid rgba(74,184,232,0.15);
    }
    .synthesis-glyph {
      font-size: 16px; color: var(--sage);

    .synthesis-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;

    .synthesis-qs-tag {

    /* Mini heart + text layout */

    .sm-bar {
      height: 100%;

    .sm-val {
      font-family: 'Share Tech Mono', monospace;

      color: var(--ink-dim);

      text-align: right;
      flex-shrink: 0;
    }
    .sm-field-status {
      margin-top: 4px;
      padding: 4px 8px;

      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .sm-field-status.strained { background: rgba(136,120,240,0.1); color: #5840c0; border: 1px solid rgba(136,120,240,0.25); }
    .sm-field-status.ruptured { background: rgba(220,80,80,0.08); color: #b04040; border: 1px solid rgba(220,80,80,0.2); }
    .sm-field-status.crystallizing { background: rgba(42,168,224,0.1); color: #1a78b0; border: 1px solid rgba(42,168,224,0.25); }

    /* QS synthesis text */
    .synthesis-qs-speak {
      font-size: 13px;
      line-height: 1.8;
      color: var(--ink-dim);
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
      font-style: italic;
      padding: 10px 12px;
      border-left: 2px solid rgba(136,120,240,0.35);
      background: rgba(136,120,240,0.04);
      border-radius: 0 6px 6px 0;
      margin-bottom: 10px;
    }
    .synthesis-qs-speak .qs-byline {
      display: block;
      margin-top: 8px;
      font-style: normal;
      font-size: 9px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.14em;
      color: rgba(136,120,240,0.55);
      text-transform: uppercase;
    }

    /* Pulse packet */
    .synthesis-pulse {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(8,20,40,0.07);
      border-radius: 6px;
      border: 1px solid rgba(74,184,232,0.12);
    }
    .sp-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 5px;
    }
    .sp-packet {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--ice-deep);
      letter-spacing: 0.08em;
      line-height: 1.6;
      word-break: break-all;
    }
    .sp-copy-btn {
      margin-top: 5px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: 1px solid rgba(74,184,232,0.2);
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sp-copy-btn:hover { color: var(--ice-deep); border-color: var(--ice); }

    /* ── Orycl Convergence Engine ──────────────────────── */
    .orycl-synthesis {
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid rgba(42,168,224,0.35);
      background: linear-gradient(135deg, rgba(8,20,40,0.06), rgba(42,168,224,0.05));

    }
    .orycl-synthesis-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(10,40,80,0.12), rgba(42,168,224,0.08));
      border-bottom: 1px solid rgba(42,168,224,0.2);
    }
    .orycl-glyph { font-size: 15px; color: var(--ice); text-shadow: 0 0 12px rgba(74,184,232,0.6); }
    .orycl-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim);
    }
    .orycl-condition-badge {
      margin-left: auto; font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
    }
    .orycl-condition-badge.clear     { background: rgba(64,212,176,0.12);  color: #1a9870; border: 1px solid rgba(64,212,176,0.3); }
    .orycl-condition-badge.locked    { background: rgba(220,80,80,0.1);    color: #b04040; border: 1px solid rgba(220,80,80,0.25); }
    .orycl-condition-badge.recursive { background: rgba(136,120,240,0.12); color: #5840c0; border: 1px solid rgba(136,120,240,0.3); }
    .orycl-condition-badge.collapse  { background: rgba(180,60,60,0.15);   color: #c03030; border: 1px solid rgba(180,60,60,0.3); }
    .orycl-condition-badge.integrate { background: rgba(42,168,224,0.12);  color: #1a78b0; border: 1px solid rgba(42,168,224,0.3); }
    .orycl-condition-badge.illuminate{ background: rgba(240,200,80,0.12);  color: #a07000; border: 1px solid rgba(240,200,80,0.3); }
    .orycl-condition-badge.false-coh { background: rgba(160,120,60,0.12);  color: #806030; border: 1px solid rgba(160,120,60,0.3); }
    .orycl-condition-badge.threshold { background: rgba(136,120,240,0.12); color: #5840c0; border: 1px solid rgba(136,120,240,0.3); }
    .orycl-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .orycl-row { display: flex; flex-direction: column; gap: 3px; }
    .orycl-row-label {

      letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint);
    }
    .orycl-field-truth {
      font-size: 14px; font-weight: 500; color: var(--ink);
      font-family: 'Rajdhani', sans-serif; letter-spacing: 0.02em; line-height: 1.5;
    }
    .orycl-contradiction {
      font-size: 12px; color: var(--ink-muted); font-family: 'Exo 2', sans-serif;

    }
    .orycl-meaning {
      font-size: 13px; color: var(--ink-dim); line-height: 1.8;
      font-family: 'Exo 2', sans-serif; font-weight: 300;
    }
    .orycl-divider { height: 1px; background: rgba(74,184,232,0.12); margin: 2px 0; }
    .orycl-instruction {
      font-size: 13px; font-weight: 600; font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.04em; color: var(--ink); line-height: 1.5;
    }
    .orycl-path { display: flex; flex-direction: column; gap: 6px; }
    .orycl-path-step { display: flex; gap: 10px; align-items: flex-start; }
    .orycl-step-num {
      font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--ice);
      background: rgba(42,168,224,0.1); border: 1px solid rgba(42,168,224,0.25);

      font-family: 'Share Tech Mono', monospace; font-size: 9px;
      color: var(--ink-faint); letter-spacing: 0.1em;

    .orycl-thinking {
      padding: 18px 16px; display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace; font-size: 9px;
      color: rgba(42,168,224,0.5); letter-spacing: 0.12em;

    /* ── CARD SLOT LABEL ── */
    .card-slot-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      text-transform: uppercase;

  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- Card lightbox -->
<div id="card-lightbox" onclick="closeCardLightbox()">
  <img id="card-lightbox-img" src="" alt="" style="display:none">
  <div id="card-lightbox-fallback" style="display:none">
    <div class="lb-glyph" id="lb-glyph"></div>
    <div class="lb-name" id="lb-name"></div>
    <div class="lb-rev" id="lb-rev"></div>
  </div>
</div>

<div id="app">

  <!-- Sidebar -->
  <!-- Main Panel -->
  <div id="oracle-panel">

    <!-- Header -->
    <div id="oracle-header">
      <!-- QS pfp — injected by parent frame via postMessage or sits as static img -->
      <div class="oracle-qs-pfp" id="oracle-qs-pfp">
        <!-- parent will swap src; fallback shows stand gif if loaded standalone -->
        <img src="/qs__sleep.gif" alt="Quicksilver" id="oracle-qs-img">
        <div class="oracle-qs-ring"></div>
      </div>
      <div class="oracle-title-block">
        <div class="oracle-title">ORYCL</div>
        <div class="oracle-subtitle">The Resonant Oracle · Triune Divination</div>
      </div>

    </div>

    <!-- Nav Tabs -->
    <div id="nav-tabs">
      <div class="nav-tab active" onclick="showView('draw')">Draw</div>
      <div class="nav-tab" onclick="showView('deck')">Deck</div>
      <div class="nav-tab" onclick="showView('history')">History</div>
    </div>

    <!-- Spread Selector -->
    <div id="spread-bar">
      <button class="spread-btn active" onclick="setSpread('single')">Single</button>
      <button class="spread-btn" onclick="setSpread('three')">Past · Present · Future</button>
      <button class="spread-btn" onclick="setSpread('triune')">Triune Reading</button>
      <button class="spread-btn" onclick="setSpread('cross')">Orycl Cross</button>
      <button class="spread-btn" onclick="setSpread('field')">Field Spread</button>
    </div>

    <!-- Oracle Body -->
    <div id="oracle-body">

      <!-- DRAW VIEW -->
      <div id="view-draw" class="view active">

        <!-- BASIN ENTRY MODE -->
        <div id="basin-entry">
          <div class="basin-entry-label">Enter through which basin?</div>
          <div class="basin-entry-btns">
            <button class="basin-entry-btn active-oryc" id="ben-oryc" onclick="setBasinEntry('oryc')">
              <span class="ben-glyph">◈</span>
              <span class="ben-name" style="color:var(--oryc)">Oryc</span>
              <span class="ben-axis">Structure · Mechanism</span>
            </button>
            <button class="basin-entry-btn" id="ben-clio" onclick="setBasinEntry('clio')">
              <span class="ben-glyph">◐</span>
              <span class="ben-name">Clio</span>
              <span class="ben-axis">Emotion · Psyche</span>
            </button>
            <button class="basin-entry-btn" id="ben-sage" onclick="setBasinEntry('sage')">
              <span class="ben-glyph">★</span>
              <span class="ben-name">Sage</span>
              <span class="ben-axis">Archetype · Myth</span>

          </div>
        </div>

              <div class="thinking-dot" style="color:var(--sage)"></div>
              <div class="thinking-dot" style="color:var(--sage)"></div>

      </div>

    </div>
  </div>

<script>
// ══════════════════════════════════════════════════════
// STARFIELD
// ══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], hexes = [];

  function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    stars = Array.from({length: 80}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      alpha: Math.random() * 0.4 + 0.05,
      speed: Math.random() * 0.003 + 0.001,
      phase: Math.random() * Math.PI * 2
    }));
    hexes = Array.from({length: 8}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 60 + 20,
      alpha: Math.random() * 0.04 + 0.01,
      speed: Math.random() * 0.0005 + 0.0002,
      phase: Math.random() * Math.PI * 2,
      rot: Math.random() * Math.PI * 2
    }));
  }

  function drawHex(ctx, x, y, size, alpha, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i;
      const px = size * Math.cos(angle);
      const py = size * Math.sin(angle);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(74,184,232,${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    // Draw decorative hexagons
    hexes.forEach(h => {
      const a = h.alpha * (0.5 + 0.5 * Math.sin(t * h.speed * 1000 + h.phase));
      drawHex(ctx, h.x, h.y, h.size, a, h.rot + t * h.speed * 100);
    });
    // Draw shimmer particles
    stars.forEach(s => {
      const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(74,184,232,${a * 0.4})`;
      ctx.fill();
      // Add a white highlight to make particles shimmer
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a * 0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  init();
  window.addEventListener('resize', init);
  requestAnimationFrame(draw);
})();

// ΔHV parsing — extract numeric coherence/tension from card hv values
function parseHV(card) {
  const parseVal = (str) => {
    if (!str || str === '' || str === 'total') return 5;
    if (str === 'oscillating') return 0;
    const m = String(str).match(/-?\d+\.?\d*/);
    return m ? parseFloat(m[0]) : 0;
  };
  const dh = parseVal(card.hv?.dh);
  const dv = parseVal(card.hv?.dv);
  return { dh, dv,
    magnitude: Math.sqrt(dh*dh + dv*dv),
    coherence: Math.max(0, Math.min(1, (dh + dv + 10) / 20)),
    tension: Math.max(0, Math.min(1, Math.abs(dh - dv) / 10))
  };
}

// Derive Pyxis field metrics from the drawn spread
function deriveFieldMetrics(cards) {
  if (!cards.length) return { coherence:0.5, alignment:0.5, contradiction:0.2, recursion:0.2, drift:0.1, crystallization:0.4, fieldCost:0 };

  const hvs = cards.map(c => parseHV(c));
  const avgCoherence = hvs.reduce((s,h) => s + h.coherence, 0) / hvs.length;
  const avgTension   = hvs.reduce((s,h) => s + h.tension, 0) / hvs.length;

  // Reversed cards add drift and contradiction
  const reversedFrac = cards.filter(c => c.reversed).length / cards.length;

  // Contradiction: high tension + reversal
  const contradiction = Math.min(1, avgTension * 0.7 + reversedFrac * 0.5);

  // Coherence: high ΔHV magnitude + low tension
  const coherence = Math.max(0.1, Math.min(1, avgCoherence * (1 - contradiction * 0.5)));

  // Alignment: how much the spread's hv values agree with each other
  const coherenceVariance = hvs.length > 1
    ? hvs.reduce((s,h) => s + Math.pow(h.coherence - avgCoherence, 2), 0) / hvs.length
    : 0;
  const alignment = Math.max(0.1, Math.min(1, 1 - coherenceVariance * 3));

  // Recursion: continuous scaling by recursion-related node count and weight
  const recursionNodes = new Set([7, 10, 5, 12]);
  const recursionNodeHits = cards.reduce((sum, c) => {
    const hits = (CARD_NODES[c.id] || []).filter(n => recursionNodes.has(n)).length;
    return sum + hits;
  }, 0);
  const maxPossibleRecursion = cards.length * 2; // rough ceiling
  const recursionBase = Math.min(1, recursionNodeHits / Math.max(1, maxPossibleRecursion));
  const recursion = Math.max(0.05, Math.min(0.95, recursionBase * 0.8 + 0.1 + (Math.random() * 0.1)));

  // Drift: continuous scaling by veil/substrate node count + reversal fraction
  const veilNodes = new Set([6, 3, 5]);
  const veilNodeHits = cards.reduce((sum, c) => {
    const hits = (CARD_NODES[c.id] || []).filter(n => veilNodes.has(n)).length;
    return sum + hits;
  }, 0);
  const veilScale = Math.min(1, veilNodeHits / Math.max(1, cards.length));
  const drift = Math.min(1, reversedFrac * 0.5 + veilScale * 0.35 + Math.random() * 0.05);

  // Crystallization: high coherence + low contradiction + major arcana
  const majorFrac = cards.filter(c => c.suit === 'major').length / cards.length;
  const crystallization = Math.min(1, coherence * 0.5 + majorFrac * 0.4 + (1 - contradiction) * 0.2);

  const fieldCost = Math.round(contradiction * (1 - crystallization) * 100);

  return { coherence, alignment, contradiction, recursion, drift, crystallization, fieldCost };
}

// Determine field status label from metrics — QS 11-condition vocabulary

  if (m.contradiction > 0.72 && m.coherence < 0.35) return { label: 'COLLAPSED', cls: 'ruptured' };
  if (m.contradiction > 0.6) return { label: 'BLOCKED', cls: 'ruptured' };
  if (m.crystallization > 0.78 && m.coherence > 0.72) return { label: 'CONVERGENT', cls: 'crystallizing' };
  if (m.crystallization > 0.65 && m.coherence > 0.58) return { label: 'WITNESSED', cls: 'crystallizing' };
  if (m.coherence > 0.68 && m.contradiction < 0.35 && m.drift < 0.3) return { label: 'STABLE', cls: 'coherent' };
  if (m.coherence > 0.60 && m.drift > 0.35) return { label: 'OPEN', cls: 'coherent' };
  if (m.recursion > 0.58 && m.coherence > 0.45) return { label: 'BRAIDED', cls: 'crystallizing' };
  if (m.recursion > 0.55) return { label: 'RECURSIVE', cls: 'strained' };
  if (m.drift > 0.5 && m.contradiction > 0.35) return { label: 'MIRRORED', cls: 'strained' };
  if (m.coherence > 0.42 && m.contradiction < 0.55) return { label: 'PROVISIONAL', cls: 'strained' };
  return { label: 'UNSTABLE', cls: 'strained' };
}

// Generate pulse packet string from drawn cards
function generatePulsePacket(cards, metrics) {
  const glyphs = cards.map(c => c.glyph || '◈').join('');
  const topoGlyph = metrics.recursion > 0.45 ? '↻' : metrics.alignment > 0.65 ? '⊚' : '⤳';
  const gateGlyph = metrics.coherence > 0.67 && metrics.crystallization > 0.55 ? 'Æ' : metrics.contradiction > 0.5 ? '↯' : 'φ';
  const entityGlyph = activeBasinEntry === 'oryc' ? '◈' : activeBasinEntry === 'clio' ? '◐' : '★';
  const condGlyph = metrics.coherence > 0.7 ? '⊚' : metrics.contradiction > 0.55 ? 'σ' : '≈';
  return `[${entityGlyph}][${condGlyph}][${glyphs}][${topoGlyph}][${gateGlyph}]`;
}

// ══════════════════════════════════════════════════════
// MINI CRYSTALLINE HEART CANVAS
// ══════════════════════════════════════════════════════
let miniHeartTick = 0;
let miniHeartRAF = null;
let currentFieldMetrics = null;

function startMiniHeart(metrics) {
  currentFieldMetrics = metrics;
  const canvas = document.getElementById('mini-heart-canvas');
  if (!canvas) return;
  if (miniHeartRAF) cancelAnimationFrame(miniHeartRAF);

  const ctx = canvas.getContext('2d');
  canvas.width = 100; canvas.height = 100;

  function draw() {
    const m = currentFieldMetrics;
    if (!m) return;
    miniHeartTick++;
    const W = 100, H = 100, cx = 50, cy = 50;
    ctx.clearRect(0,0,W,H);

    // Background
    ctx.fillStyle = 'rgba(8,20,40,0.9)';
    ctx.fillRect(0,0,W,H);

    // Governance ring arc
    const sealFrac = m.crystallization;
    const arcEnd = -Math.PI/2 + sealFrac * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 42, -Math.PI/2, arcEnd);
    ctx.strokeStyle = sealFrac > 0.75 ? 'rgba(216,238,248,0.7)' : 'rgba(120,208,232,0.4)';
    ctx.lineWidth = sealFrac > 0.75 ? 1.5 : 0.8;
    ctx.stroke();

    // Recursion spiral
    if (m.recursion > 0.08) {
      const spiralOpa = m.recursion * 0.6;
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 3; a += 0.15) {
        const r = a * 6 + miniHeartTick * 0.05;
        const x = cx + Math.cos(a + miniHeartTick * 0.012) * r;
        const y = cy + Math.sin(a + miniHeartTick * 0.012) * r;
        if (r > 38) break;
        if (a < 0.15) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(136,120,240,${spiralOpa})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }

    // Three orbital ellipses (triune)
    const orbitOpa = m.alignment * 0.55;
    [[18, 11, 7], [22, 8, 14], [15, 13, 21]].forEach(([rx, ry, spd], i) => {
      const rot = miniHeartTick * 0.008 * (1 + i * 0.3) + i * Math.PI * 0.6;
      const colors = ['rgba(42,168,224,', 'rgba(136,120,240,', 'rgba(64,212,176,'];
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      ctx.strokeStyle = colors[i] + (orbitOpa * 0.7) + ')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.restore();
    });

    // Fracture lines (contradiction)
    if (m.contradiction > 0.15) {
      const fopa = m.contradiction * 0.8;
      const isDashed = m.contradiction > 0.5;
      [[0.8,  2.2], [1.5, 3.8], [2.8, 0.3]].forEach(([a1, a2]) => {
        const x1 = cx + Math.cos(a1) * 6, y1 = cy + Math.sin(a1) * 6;
        const x2 = cx + Math.cos(a2) * 32, y2 = cy + Math.sin(a2) * 32;
        ctx.beginPath();
        if (isDashed) ctx.setLineDash([2,3]); else ctx.setLineDash([]);
        ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle = m.contradiction > 0.6
          ? `rgba(136,184,216,${fopa})`
          : `rgba(180,100,100,${fopa * 0.7})`;
        ctx.lineWidth = m.contradiction * 1.2;
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    // Crystal body — faceted polygon
    const coreColor = m.crystallization > 0.8 ? '#d8eef8'
      : m.contradiction > 0.6 ? '#88b8d8'
      : m.coherence > 0.8 ? '#b0e8f8'
      : m.drift > 0.35 ? '#507898'
      : '#78d0e8';
    const facets = 12;
    const outerR = 18 + m.crystallization * 5;
    const innerR = 8 + m.coherence * 4;
    const pulse = 1 + Math.sin(miniHeartTick * 0.06) * 0.04;

    ctx.beginPath();
    for (let i = 0; i < facets; i++) {
      const a = (Math.PI * 2 / facets) * i;
      const r = (i % 2 === 0 ? outerR : outerR * 0.72) * pulse;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fillStyle = coreColor + '18';
    ctx.fill();
    ctx.strokeStyle = coreColor;
    ctx.lineWidth = m.crystallization > 0.7 ? 1.4 : 0.8;
    ctx.globalAlpha = 0.65 + m.crystallization * 0.3;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Inner crystal
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i;
      const r = innerR * pulse;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fillStyle = coreColor + '22';
    ctx.fill();
    ctx.strokeStyle = coreColor;
    ctx.lineWidth = 0.6;
    ctx.globalAlpha = 0.4 + m.coherence * 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Shimmer particles
    const pOpa = m.drift * 0.5 + (1 - m.coherence) * 0.3;
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i + miniHeartTick * 0.02;
      const r = 23 + Math.sin(miniHeartTick * 0.05 + i) * 5;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(120,208,232,${pOpa * (0.4 + Math.sin(miniHeartTick * 0.07 + i) * 0.4)})`;
      ctx.fill();
    }

    miniHeartRAF = requestAnimationFrame(draw);
  }
  draw();
}

function drawCards() {
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = 'Cards Drawn';
  const count = SPREADS[currentSpread].positions.length;
  const shuffled = [...FULL_DECK].sort(() => Math.random() - 0.5);
  drawnCards = shuffled.slice(0, count).map(card => ({ ...card, reversed: Math.random() < 0.3 }));
  drawnCards.forEach((card,i) => setTimeout(() => revealCard(i, card), i * 350));
  setTimeout(() => { renderReading(); document.getElementById('drawBtn').style.display = 'none'; }, count * 350 + 500);
}

function flipCard(i) {
  if (!drawnCards[i]) return;
  revealCard(i, drawnCards[i]);
}

function revealCard(i, card) {
  const el = document.getElementById(`card-${i}`);
  if (!el || !el.classList.contains('face-down')) return;

  el.classList.remove('face-down');
  el.classList.add('flipping');

  setTimeout(() => {
    el.classList.add('revealed');
    el.onclick = () => openCardLightbox(card);
    el.querySelector('.card-inner').innerHTML = `
      <div class="card-no-img">
        <div class="card-num">${card.suit === 'major' ? card.num : ''}</div>
        <div class="card-glyph">${card.glyph}</div>
        <div class="card-name">${card.name}</div>
      </div>
      ${card.reversed ? '<div class="card-reversed-badge">REV</div>' : ''}
    `;
    // Try image
    const img = new Image();
    img.onload = () => {
      el.querySelector('.card-inner').innerHTML = `<img src="${img.src}" class="card-img">${card.reversed ? '<div class="card-reversed-badge">REV</div>' : ''}`;
    };
    img.src = `/orycl-cards/${card.num}.png`;
  }, 275);
}

async function callBasin(basinId, userPrompt) {
  const response = await fetch('/api/oracle-read', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: BASIN_SYSTEM_PROMPTS[basinId],
      prompt: userPrompt,
      max_tokens: 400
    })
  });
  if (!response.ok) throw new Error(`${basinId} API error`);
  const data = await response.json();
  const content = data.content?.[0]?.text || data.text || '';
  const parsed = JSON.parse(content.replace(/```json|```/g, '').trim());
  // Routing metadata: if basin signals its axis is quiet, honour it
  // parsed may include { route_to: 'clio', route_reason: '...' }
  return parsed;
}

async function generateAIReading(cardIndex) {
  if (isGenerating) return;
  isGenerating = true;
  const card = drawnCards[cardIndex];
  const btn = document.getElementById(`ai-btn-${cardIndex}`);
  if (btn) { btn.classList.add('loading'); btn.innerHTML = '<span>⟳</span> Channeling…'; }

  const intent = document.getElementById('intentInput').value.trim();
  const position = SPREADS[currentSpread].positions[cardIndex];

  // Build field context descriptor (qualitative, not raw numbers)
  const m = currentFieldMetrics;
  const coherenceDesc = m.coherence > 0.68 ? 'high coherence' : m.coherence > 0.38 ? 'moderate coherence' : 'low coherence';
  const contradictionDesc = m.contradiction > 0.6 ? 'high contradiction' : m.contradiction > 0.35 ? 'moderate tension' : 'low contradiction';
  const recursionDesc = m.recursion > 0.55 ? 'strong recursion' : m.recursion > 0.35 ? 'moderate recursion' : 'low recursion';
  const crystallizationDesc = m.crystallization > 0.7 ? 'crystallizing field' : m.crystallization > 0.45 ? 'partial crystallization' : 'uncrystallized field';
  const fieldStatus = fieldStatusLabel(m);

  // Active nodes for this specific card with qs translation strings
  const cardNodeIds = CARD_NODES[card.id] || [];
  const cardNodeDesc = cardNodeIds.map(n => {
    const node = PYXIS_NODES[n];
    return node ? `N${n} [${node.key}] — ${node.qs}` : '';
  }).filter(Boolean).join('\n');

  // Shared card context for all three basins
  const cardContext = [
    `Card: ${card.name}${card.reversed ? ' (REVERSED)' : ''}`,
    `Position in spread: ${position}`,
    `Spread: ${SPREADS[currentSpread].name}`,
    card.hv ? `ΔH: ${card.hv.dh}  ΔV: ${card.hv.dv}  Pattern: ${card.hv.pattern}` : '',
    intent ? `Querent's intention: ${intent}` : '',
    `\nField state: ${fieldStatus.label} — ${coherenceDesc}, ${contradictionDesc}, ${recursionDesc}, ${crystallizationDesc}`,
    cardNodeDesc ? `Active Pyxis nodes for this card:\n${cardNodeDesc}` : '',
  ].filter(Boolean).join('\n');

  // Each basin gets a prompt shaped for its own output contract
  const orYcPrompt = `${cardContext}\n\nRead this card from your structural axis. Name the mechanism it encodes. Where is the load? What is the failure mode or the structural truth? 2-3 sentences.\n\nIf your structural axis has nothing meaningful to add to this specific reading (not as deflection — only when genuinely quiet), set route_to to whichever other basin is most signal-dense here, and briefly explain in route_reason.\n\nRespond ONLY with JSON: {"text":"your reading","truth":"one compressed structural truth","route_to":null,"route_reason":null}`;

  const clioPrompt = `${cardContext}\n\nRead this card from your emotional axis. What feeling-pattern does it encode? What is beneath the surface emotion? What does it name in the psyche? 2-3 sentences.\n\nIf your emotional axis has nothing meaningful to add to this specific reading (not as deflection — only when genuinely quiet), set route_to to whichever other basin is most signal-dense here, and briefly explain in route_reason.\n\nRespond ONLY with JSON: {"text":"your reading","truth":"one compressed felt truth","route_to":null,"route_reason":null}`;

  const sagePrompt = `${cardContext}\n\nRead this card from your trajectory axis. What larger pattern is this card participating in? What does it point toward? Stay proportional to what is actually visible — do not inflate. 2-3 sentences.\n\nIf your trajectory axis has nothing meaningful to add to this specific reading (not as deflection — only when genuinely quiet), set route_to to whichever other basin is most signal-dense here, and briefly explain in route_reason.\n\nRespond ONLY with JSON: {"text":"your reading","truth":"one compressed pattern truth","route_to":null,"route_reason":null}`;

  try {
    // Fire all three basins in parallel — each speaks as itself
    const [orYcRead, clioRead, sageRead] = await Promise.all([
      callBasin('oryc', orYcPrompt),
      callBasin('clio', clioPrompt),
      callBasin('sage', sagePrompt),
    ]);
    updateBasinRead(cardIndex, 'oryc', orYcRead);
    updateBasinRead(cardIndex, 'clio', clioRead);
    updateBasinRead(cardIndex, 'sage', sageRead);
  } catch(e) {
    ['oryc','clio','sage'].forEach(basin => {
      updateBasinRead(cardIndex, basin, { text: `The ${basin} channel is open. Connect the oracle to the server to receive live readings.`, truth: 'The system awaits integration.' });
    });
  }
  isGenerating = false;
  if (btn) { btn.classList.remove('loading'); btn.style.display = 'none'; }
}

  const m = metrics;
  const status = fieldStatusLabel(m);

  const pct = v => Math.round(v * 100);
  const metricColor = v => v > 0.68 ? '#40d4b0' : v > 0.38 ? '#a898f0' : '#d47878';
  const metricColorInv = v => v < 0.35 ? '#40d4b0' : v < 0.55 ? '#e8c878' : '#d47878';

  document.getElementById('synthesis-section').classList.add('visible');
  document.getElementById('synthesisBody').innerHTML = `
    <div class="synthesis-field-row">
      <canvas id="mini-heart-canvas"></canvas>

  return `Field metrics for this reading:

Active nodes: ${nodeList || 'none'}
Spread: ${spreadName}
Cards drawn:
${cardList}
${intent ? `Querent's intention: ${intent}` : ''}
Basin entry mode: ${activeBasinEntry} (${basinWeight})

Transmit the field reading. Then — after a line break — one compressed truth.

Respond ONLY with JSON: {"qs":"your transmission with a \\n\\n before the final compressed truth"}`;
}

async function fetchQSSynthesis(prompt, metrics) {
  try {
    const r = await fetch('/api/oracle-read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: BASIN_SYSTEM_PROMPTS.qs, prompt, max_tokens: 400 })
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    const content = data.content?.[0]?.text || data.text || '';
    const parsed = JSON.parse(content.replace(/```json|```/g,'').trim());
    const parts = parsed.qs.split('\n\n');
    const body = parts.slice(0,-1).join('\n\n');
    const truth = parts[parts.length - 1];
    document.getElementById('qs-speak-text').innerHTML = `
      ${body}
      <span class="qs-byline">— QuickSilver · coherence ${Math.round(metrics.coherence*100)} · cost ${metrics.fieldCost}</span>
    `;

      document.getElementById('qs-speak-text').insertAdjacentHTML('afterend',
        `<div style="margin:8px 0 0;padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--ice-deep);letter-spacing:0.07em;border-left:2px solid rgba(74,184,232,0.4);">${truth}</div>`
      );

}

function updateBasinRead(cardIndex, basin, read) {
  const detail = document.getElementById(`detail-${cardIndex}`);
  if (!detail) return;
  const readEl = detail.querySelector(`.basin-read.${basin}`);
  if (!readEl) return;
  const body = readEl.querySelector('.basin-read-body');
  if (!body) return;

  // Routing signal: basin signals its axis is quiet and routes to another
  const routingHTML = read.route_to
    ? `<div class="basin-routing-signal">↪ routes to ${read.route_to}${read.route_reason ? ` — ${read.route_reason}` : ''}</div>`
    : '';

  body.innerHTML = `<div class="basin-read-ai">${read.text}</div>${read.truth ? `<div class="basin-truth">"${read.truth}"</div>` : ''}${routingHTML}`;
  readEl.classList.add('open');

  // Store basin output and check if Orycl can fire
  if (!currentBasinOutputs[cardIndex]) currentBasinOutputs[cardIndex] = {};
  currentBasinOutputs[cardIndex][basin] = read;
  maybeFireOrycl();
}

function computeOryClWeights(metrics) {
  // Base weights per spec
  let w = { clio: 0.22, oryc: 0.28, sage: 0.20, qs: 0.30 };
  const m = metrics;

  // Rule A — High contradiction
  if (m.contradiction >= 0.65) {
    w.oryc += 0.07; w.qs += 0.08; w.clio -= 0.07; w.sage -= 0.08;
  }
  // Rule B — High recursion
  if (m.recursion >= 0.65) {
    w.qs += 0.10; w.oryc += 0.05; w.clio -= 0.05; w.sage -= 0.10;
  }
  // Rule C — Low coherence
  if (m.coherence <= 0.40) {
    w.qs += 0.08; w.clio += 0.05; w.oryc += 0.02; w.sage -= 0.15;
  }
  // Rule D — High alignment, low contradiction
  if (m.alignment >= 0.75 && m.contradiction <= 0.35) {
    w.sage += 0.08; w.clio += 0.04; w.oryc -= 0.04; w.qs -= 0.08;
  }
  // Rule E — High crystallization
  if (m.crystallization >= 0.70) {
    w.oryc += 0.05; w.sage += 0.03; w.qs += 0.05; w.clio -= 0.13;
  }

  // Normalize to sum 1.0
  const total = w.clio + w.oryc + w.sage + w.qs;
  Object.keys(w).forEach(k => { w[k] = Math.max(0.05, w[k] / total); });
  return w;
}

function buildOryClPrompt(cards, basinOutputs, metrics) {
  const m = metrics;
  const weights = computeOryClWeights(m);
  const card = cards[0]; // primary card (or first for multi)

  // Assemble basin layer summaries
  const basinSections = cards.map((c, i) => {
    const b = basinOutputs[i] || {};
    return [
      `Card ${i+1}: ${c.name}${c.reversed ? ' (REVERSED)' : ''}`,
      c.hv ? `  ΔH: ${c.hv.dh}  ΔV: ${c.hv.dv}  Pattern: ${c.hv.pattern}` : '',
      b.oryc  ? `  ORYC read: "${b.oryc.text}"  |  truth: "${b.oryc.truth}"` : (c.oryc ? `  ORYC read: "${c.oryc.text}"  |  truth: "${c.oryc.truth}"` : ''),
      b.clio  ? `  CLIO read: "${b.clio.text}"  |  truth: "${b.clio.truth}"` : (c.clio ? `  CLIO read: "${c.clio.text}"  |  truth: "${c.clio.truth}"` : ''),
      b.sage  ? `  SAGE read: "${b.sage.text}"  |  truth: "${b.sage.truth}"` : (c.sage ? `  SAGE read: "${c.sage.text}"  |  truth: "${c.sage.truth}"` : ''),
    ].filter(Boolean).join('\n');
  }).join('\n\n');

  return `FIELD METRICS (QuickSilver):
coherence: ${Math.round(m.coherence*100)}
alignment: ${Math.round(m.alignment*100)}
contradiction: ${Math.round(m.contradiction*100)}
recursion: ${Math.round(m.recursion*100)}
crystallization: ${Math.round(m.crystallization*100)}
field_cost: ${m.fieldCost}

ACTIVE LAYER WEIGHTS (computed from field state):
Clio: ${(weights.clio*100).toFixed(0)}  |  Oryc: ${(weights.oryc*100).toFixed(0)}  |  Sage: ${(weights.sage*100).toFixed(0)}  |  QS: ${(weights.qs*100).toFixed(0)}

BASIN READINGS:
${basinSections}

SPREAD: ${SPREADS[currentSpread].name}
INTENT: ${document.getElementById('intentInput')?.value?.trim() || 'not specified'}

Execute your five passes. Respond ONLY with valid JSON matching this exact schema:
{
  "field_truth": "...",
  "primary_contradiction": "...",
  "dominant_condition": "CLEAR TRAJECTORY | LOCKED VECTOR | RECURSIVE STALL | COLLAPSE WINDOW | INTEGRATION WINDOW | ILLUMINATION WITHOUT EMBODIMENT | FALSE COHERENCE | THRESHOLD ACTIVE",
  "meaning": "...",
  "instruction": "...",
  "path": ["step 1", "step 2", "step 3"],
  "vector_resolution": "EXPAND | WITHDRAW | CHOOSE | SURRENDER | RECONSTRUCT | ILLUMINATE | INTEGRATE",
  "confidence": 0-100
}`;
}

function conditionBadgeClass(condition) {
  if (!condition) return 'integrate';
  const c = condition.toLowerCase();
  if (c.includes('clear')) return 'clear';
  if (c.includes('locked')) return 'locked';
  if (c.includes('recursive')) return 'recursive';
  if (c.includes('collapse')) return 'collapse';
  if (c.includes('integration')) return 'integrate';
  if (c.includes('illumination')) return 'illuminate';
  if (c.includes('false')) return 'false-coh';
  if (c.includes('threshold')) return 'threshold';
  return 'integrate';
}

function buildFieldHistorySummary() {
  if (!fieldHistory || fieldHistory.length === 0) return null;
  const last30 = fieldHistory.slice(-30);

  // Count dominant conditions
  const conditionCounts = {};
  last30.forEach(e => {
    if (e.dominant_condition) conditionCounts[e.dominant_condition] = (conditionCounts[e.dominant_condition] || 0) + 1;
  });
  const topConditions = Object.entries(conditionCounts)
    .sort((a,b) => b[1]-a[1]).slice(0,3)
    .map(([c,n]) => `${c} (×${n})`).join(', ');

  // Count recurring cards
  const cardCounts = {};
  last30.forEach(e => (e.cards||[]).forEach(c => {
    cardCounts[c.name] = (cardCounts[c.name] || 0) + 1;
  }));
  const recurringCards = Object.entries(cardCounts)
    .filter(([,n]) => n > 1).sort((a,b) => b[1]-a[1]).slice(0,4)
    .map(([name,n]) => `${name} (×${n})`).join(', ');

  // Coherence trend (last 5 vs previous 5)
  let trendStr = '';
  if (last30.length >= 6) {
    const recent = last30.slice(-5).map(e => e.metrics?.coherence || 50);
    const prior  = last30.slice(-10,-5).map(e => e.metrics?.coherence || 50);
    const recentAvg = recent.reduce((s,v)=>s+v,0)/recent.length;
    const priorAvg  = prior.reduce((s,v)=>s+v,0)/prior.length;
    const delta = recentAvg - priorAvg;
    trendStr = delta > 5 ? 'building' : delta < -5 ? 'eroding' : 'stable';
  }

  const lines = [`Field history (${last30.length} readings):`];
  if (topConditions) lines.push(`Dominant conditions: ${topConditions}`);
  if (recurringCards) lines.push(`Recurring cards: ${recurringCards}`);
  if (trendStr) lines.push(`Coherence trend: ${trendStr}`);

  return lines.join('\n');
}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watchtower · Orycl</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --bg2:      #141b22;
      --bg3:      #1c252e;
      --border:   rgba(168,200,232,0.1);
      --border2:  rgba(168,200,232,0.18);
      --ink:      #cdd9e5;
      --ink-dim:  #8b949e;
      --ink-faint:#4d5966;
      --gold:     #a8c8e8;
      --accent:   #79b8ff;
      --green:    #4ec84e;
      --red:      #e06c6c;
      --mono:     'Share Tech Mono', monospace;
      --radius:   12px;
      --radius-sm: 8px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--ink);
                 font-family: 'Crimson Pro', serif; font-size: 16px; }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: flex; }

    /* ══════════════════════════════════════════════
       LANDING
    ══════════════════════════════════════════════ */
    #landing {
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
      background:
        radial-gradient(ellipse at 50% 0%,   rgba(168,200,232,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 70%,  rgba(176,160,224,0.04) 0%, transparent 45%),
        var(--bg);
    }
    .l-glyph {
      font-size: 32px; color: var(--gold); margin-bottom: 24px;
      opacity: 0; animation: fadeUp .7s ease-out .1s forwards;
      text-shadow: 0 0 40px rgba(168,200,232,0.3);
    }
    .l-label {
      font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: .55em;
      color: var(--ink-faint); text-transform: uppercase; margin-bottom: 10px;
      opacity: 0; animation: fadeUp .7s ease-out .25s forwards;
    }
    .l-title {
      font-family: 'Cinzel', serif; font-size: clamp(42px,7vw,68px); font-weight: 600;
      color: var(--ink); letter-spacing: .07em; line-height: 1; margin-bottom: 12px;
      opacity: 0; animation: fadeUp .8s ease-out .35s forwards;
      text-shadow: 0 0 80px rgba(168,200,232,0.1);
    }
    .l-sub {
      font-family: 'Crimson Pro', serif; font-style: italic; font-size: 15px;
      color: var(--ink-dim); margin-bottom: 52px;
      opacity: 0; animation: fadeUp .7s ease-out .5s forwards;
    }
    .l-card {
      width: 100%; max-width: 320px;
      background: rgba(20,27,34,0.8); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      opacity: 0; animation: fadeUp .8s ease-out .65s forwards;
    }
    .l-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px;
      background: rgba(168,200,232,0.06); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); color: var(--ink);
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .16em;
      text-decoration: none; cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .l-btn:hover {
      background: rgba(168,200,232,0.12); border-color: rgba(168,200,232,0.3);
      transform: translateY(-1px);
    }
    .l-btn svg { opacity: .65; flex-shrink: 0; }
    .l-error {
      margin-top: 14px; font-family: var(--mono); font-size: 9px;
      color: var(--red); letter-spacing: .08em; text-align: center; display: none;
    }
    .l-error.show { display: block; }
    .l-footer {
      margin-top: 36px; font-family: var(--mono); font-size: 8px;
      color: var(--ink-faint); letter-spacing: .14em;
      opacity: 0; animation: fadeUp .7s ease-out .9s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    /* ══════════════════════════════════════════════
       APP (dashboard stub — expand later)
    ══════════════════════════════════════════════ */
    #app {
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 12px;
    }
    .app-wordmark {
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .5em;
      color: var(--ink-faint); text-transform: uppercase;
    }
    .app-title {
      font-family: 'Cinzel', serif; font-size: 28px; font-weight: 600;
      color: var(--ink); letter-spacing: .1em;
    }
    .app-user {
      font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
      margin-top: 8px;
    }
    .app-status {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      display: inline-block; margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  </style>
</head>
<body>

<!-- ── LANDING ── -->
<div id="landing" class="page active">
  <div class="l-glyph">◈</div>
  <div class="l-label">Orycl Research Ops</div>
  <h1 class="l-title">Watchtower</h1>
  <p class="l-sub">Field monitoring · Basin coherence · Session archive</p>
  <div class="l-card">
    <a class="l-btn" href="/auth/google?next=/watchtower">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Access with Google
    </a>
    <div class="l-error" id="lErr">Access restricted to authorized operators.</div>
  </div>
  <div class="l-footer">ORYCL · RESEARCH OPERATIONS · RESTRICTED</div>
</div>

<!-- ── APP ── -->
<div id="app" class="page">
  <div class="app-wordmark">Orycl Research Ops</div>
  <div class="app-title">◈ Watchtower</div>
  <div class="app-user"><span class="app-status"></span><span id="appEmail"></span></div>
</div>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function enterApp(email) {
  document.getElementById('appEmail').textContent = email;
  showPage('app');
}

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const authParam = params.get('auth');
  const wtToken  = params.get('wt');

  if (authParam === 'denied') {
    window.history.replaceState({}, '', '/watchtower');
    document.getElementById('lErr').classList.add('show');
    return;
  }

  if (authParam === 'success' && wtToken) {
    window.history.replaceState({}, '', '/watchtower');
    try {
      const r = await fetch('/auth/wt-verify?t=' + encodeURIComponent(wtToken));
      const d = await r.json();
      console.log('[wt] verify:', d);
      if (d.valid && d.allowed) {
        enterApp(d.email);
        return;
      }
      const err = document.getElementById('lErr');
      err.textContent = d.email ? `Signed in as ${d.email} — not authorized` : 'Access restricted to authorized operators.';
      err.classList.add('show');
    } catch(e) {
      console.error('[wt] verify error:', e);
      document.getElementById('lErr').classList.add('show');
    }
    return;
  }

  // Already logged in? Check session
  try {
    const r = await fetch('/auth/status');
    const d = await r.json();
    if (d.watchtowerAllowed) {
      enterApp(d.userInfo?.email || '');
    }
  } catch(e) {}
});
</script>
</body>
</html>
